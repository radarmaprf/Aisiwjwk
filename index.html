<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Air Alert Map — Мониторинг угроз РФ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #03050b;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            overflow: hidden;
            transition: background 0.3s ease;
        }
        body.light-theme {
            background: #eef2f5;
        }
        body.light-theme .toolbar,
        body.light-theme .legend,
        body.light-theme .update-info,
        body.light-theme .ruler-panel,
        body.light-theme .alerts-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-color: rgba(0, 0, 0, 0.15);
            color: #1a1e2c;
        }
        body.light-theme .time-main,
        body.light-theme .region-name,
        body.light-theme .time-result {
            color: #0a0e1a;
        }
        body.light-theme .tool-btn {
            background: rgba(0, 0, 0, 0.1);
            color: #111;
        }
        body.light-theme .alert-region-item {
            background: rgba(0, 0, 0, 0.05);
        }
        .clock {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            background: rgba(10, 14, 26, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 8px 20px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .time-main {
            font-size: 1.9rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .date {
            font-size: 0.65rem;
            opacity: 0.85;
            margin-top: 4px;
            text-transform: uppercase;
        }
        .legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 2000;
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 12px 18px;
            color: #eef2ff;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .legend-color {
            width: 28px;
            height: 18px;
            border-radius: 20px;
        }
        .update-info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 6px 18px;
            color: #ccc;
            font-size: 0.75rem;
            font-family: monospace;
            pointer-events: none;
        }
        .status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 5px 18px;
            color: #ddd;
            font-size: 0.7rem;
            font-family: monospace;
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid rgba(255,255,100,0.3);
        }
        .alert-list-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2000;
            background: linear-gradient(95deg, #dc3545, #b02a37);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 60px;
            padding: 10px 22px;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Segoe UI', monospace;
            box-shadow: 0 4px 14px rgba(220,53,69,0.4);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-list-btn:hover { transform: scale(1.02); background: #9c1f2e; }
        .toolbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .tool-btn {
            background: rgba(30, 35, 55, 0.9);
            border: none;
            color: white;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tool-btn.active { background: #2ecc71; box-shadow: 0 0 12px #2ecc71; }
        .tool-btn:hover { background: #2ecc71; transform: translateY(-2px); }
        .tool-btn.danger { background: #e67e22; }
        .tool-btn.danger:hover { background: #d35400; }
        .ruler-panel {
            position: fixed;
            top: 90px;
            left: 20px;
            z-index: 2100;
            background: rgba(8, 12, 24, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 16px 20px;
            width: 280px;
            border: 1px solid rgba(255, 193, 7, 0.5);
            display: none;
            flex-direction: column;
            gap: 12px;
            font-family: monospace;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            color: white;
        }
        .ruler-panel.show { display: flex; }
        .ruler-panel h4 { margin: 0; color: #ffc107; font-size: 1.1rem; display: flex; gap: 8px; align-items: center; }
        .threat-select {
            background: #1e243b;
            color: white;
            border: 1px solid #ffc10760;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .distance-info {
            background: #00000066;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            color: #eee;
        }
        .time-result {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffaa33;
            text-shadow: 0 0 6px #ffaa3350;
            margin-top: 6px;
        }
        .alerts-panel {
            position: fixed;
            top: 0;
            left: -360px;
            width: 340px;
            height: 100%;
            background: rgba(8, 12, 24, 0.96);
            backdrop-filter: blur(20px);
            z-index: 3000;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-right: 1px solid rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', monospace;
            box-shadow: 6px 0 30px rgba(0,0,0,0.6);
        }
        .alerts-panel.open { left: 0; }
        .panel-header {
            padding: 22px 20px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
        }
        .panel-header h3 { color: #ffc107; font-size: 1.3rem; margin: 0; display: flex; gap: 8px; }
        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .copy-btn:hover { background: #2ecc71; }
        .close-panel {
            background: none; border: none; color: white; font-size: 2rem; cursor: pointer;
            line-height: 1; transition: 0.2s;
        }
        .close-panel:hover { color: #ff6b6b; transform: rotate(90deg); }
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
        }
        .alert-region-item {
            background: rgba(35, 40, 58, 0.8);
            margin-bottom: 12px;
            padding: 14px;
            border-radius: 20px;
            border-left: 6px solid;
            transition: 0.1s;
            backdrop-filter: blur(4px);
        }
        .alert-region-item.rocket { border-left-color: #8B0000; background: linear-gradient(95deg, #2a121f, #1f0f1a); }
        .alert-region-item.droneAlert { border-left-color: #dc3545; }
        .alert-region-item.droneDanger { border-left-color: #ffc107; }
        .region-name { font-weight: bold; font-size: 1rem; margin-bottom: 6px; }
        .alert-type { font-size: 0.75rem; display: inline-block; padding: 4px 12px; border-radius: 60px; font-weight: 600; }
        .copy-toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: #2ecc71; color: #111; padding: 8px 20px; border-radius: 60px;
            z-index: 4000; font-weight: bold; animation: fadeOut 2s forwards;
            pointer-events: none; font-family: monospace;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .glow-border {
            filter: drop-shadow(0 0 5px rgba(139,0,0,0.8));
            animation: pulseGlow 1.2s infinite;
        }
        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 2px rgba(139,0,0,0.5)); }
            100% { filter: drop-shadow(0 0 12px rgba(139,0,0,0.9)); }
        }
        .custom-popup .leaflet-popup-content-wrapper { background: #151e2c; color: #fff; border-radius: 20px; border-left: 4px solid #ffc107; }
        .leaflet-control-attribution { display: none; }
        .leaflet-interactive-off {
            pointer-events: none !important;
        }
        @media (max-width: 650px) {
            .toolbar { top: 75px; padding: 5px 12px; gap: 6px; }
            .tool-btn { padding: 4px 12px; font-size: 0.7rem; }
            .clock { top: 12px; right: 12px; padding: 4px 12px; }
            .time-main { font-size: 1.2rem; }
            .alerts-panel { width: 85%; left: -85%; }
            .ruler-panel { width: 240px; top: 110px; left: 10px; }
            .legend { bottom: 12px; left: 12px; padding: 8px 12px; }
        }
    </style>
</head>
<body>

<div class="clock"><div class="time-main" id="liveTime">--:--</div><div class="date" id="liveDate">--</div></div>
<button class="alert-list-btn" id="openPanelBtn"><i class="fas fa-exclamation-triangle"></i> Список тревог</button>

<div class="toolbar">
    <button id="rulerBtn" class="tool-btn"><i class="fas fa-ruler"></i> Линейка</button>
    <button id="clearRulerBtn" class="tool-btn danger"><i class="fas fa-trash-alt"></i> Сброс</button>
    <div id="themeToggleBtn" class="tool-btn" style="padding: 6px 18px;"><i class="fas fa-moon"></i> Тема</div>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Безопасно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>🔴 Тревога БПЛА (ПВО)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #8B0000;"></div> <span>🟤 Ракетная угроза</span></div>
</div>

<div class="update-info" id="lastUpdateInfo"><i class="far fa-clock"></i> Обновление: --:--</div>
<div class="status" id="status"><i class="fas fa-sync-alt fa-spin"></i> Загрузка карты...</div>

<div id="rulerPanel" class="ruler-panel">
    <h4><i class="fas fa-charging-station"></i> Оценка угрозы</h4>
    <select id="threatType" class="threat-select">
        <option value="drone">🛩 БПЛА (180 км/ч)</option>
        <option value="jet_drone">🚀 Реакт. БПЛА (450 км/ч)</option>
        <option value="cruise">✈️ Крылатая ракета (850 км/ч)</option>
        <option value="ballistic">💥 Баллист. ракета (9000 км/ч)</option>
    </select>
    <div class="distance-info">
        <p><i class="fas fa-map-marker-alt"></i> Расстояние: <span id="distKm">0</span> км</p>
        <p><i class="fas fa-hourglass-half"></i> Время подлёта:</p>
        <div id="timeResult" class="time-result">—</div>
    </div>
    <small style="font-size:0.65rem; opacity:0.7;">★ Два клика по карте → точки A и B</small>
</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1;"></div>

<div id="alertsPanel" class="alerts-panel">
    <div class="panel-header">
        <h3><i class="fas fa-bell"></i> Активные тревоги</h3>
        <div style="display: flex; gap: 12px;"><button class="copy-btn" id="copyAlertsBtn"><i class="fas fa-copy"></i> Копировать</button><button class="close-panel" id="closePanelBtn">&times;</button></div>
    </div>
    <div class="panel-content" id="panelContent"><div class="empty-message">📭 Нет активных тревог</div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
    // --- КАРТА ---
    const map = L.map('map').setView([62, 105], 3.8);
    const darkTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '', subdomains: 'abcd', maxZoom: 10, minZoom: 2 });
    const lightTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '', subdomains: 'abcd' });
    let currentTile = darkTile;
    currentTile.addTo(map);
    function setTileLayer(layer) { map.removeLayer(currentTile); currentTile = layer; currentTile.addTo(map); }

    // --- ДАННЫЕ ---
    let polygonsLayer = null;
    let regionStatus = {};
    let lastUpdateTime = null;
    const colors = { clear: "#6c757d", droneDanger: "#ffc107", droneAlert: "#dc3545", rocket: "#8B0000" }; // бордовый

    const allRegionNames = [
        "Москва", "Московская область", "Санкт-Петербург", "Ленинградская область",
        "Белгородская область", "Брянская область", "Владимирская область", "Воронежская область",
        "Ивановская область", "Калужская область", "Костромская область", "Курская область",
        "Липецкая область", "Нижегородская область", "Новгородская область", "Орловская область",
        "Пензенская область", "Псковская область", "Рязанская область", "Смоленская область",
        "Тамбовская область", "Тверская область", "Тульская область", "Ярославская область",
        "Краснодарский край", "Ставропольский край", "Ростовская область", "Волгоградская область",
        "Татарстан", "Башкортостан", "Марий Эл", "Чувашская Республика", "Республика Мордовия",
        "Удмуртская Республика", "Самарская область", "Саратовская область", "Ульяновская область",
        "Свердловская область", "Челябинская область", "Курганская область", "Оренбургская область",
        "Пермский край", "Новосибирская область", "Томская область", "Кемеровская область",
        "Иркутская область", "Красноярский край", "Алтайский край", "Забайкальский край",
        "Приморский край", "Хабаровский край", "Амурская область", "Сахалинская область",
        "Магаданская область", "Камчатский край", "Мурманская область", "Крым", "Дагестан",
        "Республика Карелия", "Республика Коми", "Республика Саха (Якутия)", "ХМАО", "ЯНАО", "Адыгея"
    ];
    const ignoredRegions = ["Астраханская область", "Архангельская область", "Омская область"];

    const geoNameMapping = {
        "Чувашская Республика": "Чувашская Республика", "Республика Татарстан": "Татарстан",
        "Республика Башкортостан": "Башкортостан", "Удмуртская Республика": "Удмуртская Республика",
        "Республика Мордовия": "Республика Мордовия", "Республика Марий Эл": "Марий Эл",
        "Чеченская Республика": "Чечня", "Республика Дагестан": "Дагестан",
        "Республика Адыгея": "Адыгея", "Республика Карелия": "Республика Карелия",
        "Республика Коми": "Республика Коми", "Ямало-Ненецкий АО": "ЯНАО",
        "Ханты-Мансийский АО": "ХМАО", "г. Москва": "Москва", "Москва": "Москва",
        "Санкт-Петербург": "Санкт-Петербург", "Республика Крым": "Крым"
    };
    function normalizeRegionName(geoName) { return geoNameMapping[geoName] || geoName; }

    async function fetchAlerts() {
        try {
            const resp = await fetch("alerts.json?" + Date.now());
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            if (data && data.regions) {
                const newStatus = {};
                for (const [region, st] of Object.entries(data.regions)) {
                    if (ignoredRegions.includes(region)) continue;
                    newStatus[region] = { rocket: !!st.rocket, droneAlert: !!st.droneAlert, droneDanger: !!st.droneDanger };
                }
                for (const region of allRegionNames) {
                    if (!newStatus[region]) newStatus[region] = { rocket: false, droneAlert: false, droneDanger: false };
                }
                regionStatus = newStatus;
                lastUpdateTime = data.last_updated ? new Date(data.last_updated) : new Date();
                updateMapAndPanel();
                updateLastUpdateInfo();
                const timeStr = lastUpdateTime.toLocaleTimeString();
                document.getElementById('status').innerHTML = `✅ Данные: ${timeStr}`;
                setTimeout(()=>{ if(document.getElementById('status').innerHTML.includes('✅')) document.getElementById('status').innerHTML = `📡 Актуально на ${timeStr}`; }, 3000);
            } else throw new Error("Формат JSON");
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerHTML = `⚠️ Ошибка: ${err.message}`;
        }
    }

    function updateLastUpdateInfo() {
        const el = document.getElementById('lastUpdateInfo');
        if(lastUpdateTime) el.innerHTML = `<i class="far fa-clock"></i> Обновление: ${lastUpdateTime.toLocaleTimeString()}`;
        else el.innerHTML = `<i class="far fa-clock"></i> Ожидание...`;
    }

    function getEffectiveStatus(region) { return regionStatus[region] || { rocket: false, droneAlert: false, droneDanger: false }; }
    function getFillColor(effective) {
        if(effective.rocket) return colors.rocket;
        if(effective.droneAlert) return colors.droneAlert;
        if(effective.droneDanger) return colors.droneDanger;
        return colors.clear;
    }
    function getPopupContent(regionName, effective) {
        let text = "", color="";
        if(effective.rocket) { text = "🟤 РАКЕТНАЯ ОПАСНОСТЬ! УКРЫТЬСЯ!"; color="#ff8866"; }
        else if(effective.droneAlert) { text = "🔴 ТРЕВОГА БПЛА! Работа ПВО"; color="#ff6666"; }
        else if(effective.droneDanger) { text = "🟡 Опасность БПЛА в регионе"; color="#ffc107"; }
        else { text = "⚡ Отбой / Спокойно"; color="#a0c0e0"; }
        return `<div style="font-family:Segoe UI;"><b>${regionName}</b><br><span style="color:${color}">${text}</span></div>`;
    }

    function updateMapAndPanel() {
        if(!polygonsLayer) return;
        polygonsLayer.eachLayer(layer => {
            const norm = normalizeRegionName(layer.regionName);
            const effective = getEffectiveStatus(norm);
            layer.setStyle({ fillColor: getFillColor(effective), fillOpacity: 0.75, weight: 2, color: effective.rocket ? '#ffaa66' : '#ddd' });
            if(effective.rocket || effective.droneAlert) {
                if(layer._path) layer._path.classList.add('glow-border');
                else layer.on('add', ()=> { if(layer._path) layer._path.classList.add('glow-border'); });
            } else {
                if(layer._path) layer._path.classList.remove('glow-border');
            }
            const popup = layer.getPopup();
            if(popup) popup.setContent(getPopupContent(norm, effective));
        });
        updateAlertsPanel();
        updateStatsWidget();
    }

    function updateAlertsPanel() {
        const panelDiv = document.getElementById('panelContent');
        const active = [];
        for (const [region, st] of Object.entries(regionStatus)) {
            if(ignoredRegions.includes(region)) continue;
            if(st.rocket) active.push({ name: region, type: 'rocket', label: '🟤 Ракетная опасность', priority:1 });
            else if(st.droneAlert) active.push({ name: region, type: 'droneAlert', label: '🔴 Тревога БПЛА (ПВО)', priority:2 });
            else if(st.droneDanger) active.push({ name: region, type: 'droneDanger', label: '🟡 Опасность БПЛА', priority:3 });
        }
        if(active.length===0) { panelDiv.innerHTML = '<div class="empty-message"><i class="far fa-check-circle"></i> Нет активных тревог</div>'; return; }
        active.sort((a,b)=>a.priority-b.priority);
        panelDiv.innerHTML = active.map(r => `<div class="alert-region-item ${r.type}"><div class="region-name"><i class="fas fa-map-pin"></i> ${r.name}</div><div class="alert-type ${r.type}">${r.label}</div></div>`).join('');
    }

    function updateStatsWidget() {
        let rocket=0, droneA=0, droneD=0;
        for(const st of Object.values(regionStatus)) {
            if(st.rocket) rocket++;
            else if(st.droneAlert) droneA++;
            else if(st.droneDanger) droneD++;
        }
        const statDiv = document.getElementById('status');
        if(statDiv && !statDiv.innerHTML.includes('Ошибка')) {
            statDiv.innerHTML = `🔥 Ракет:${rocket}  🚁 БПЛА-ПВО:${droneA}  ⚠️ БПЛА-опасн:${droneD} | ${lastUpdateTime ? lastUpdateTime.toLocaleTimeString() : ''}`;
        }
    }

    // --- ЛИНЕЙКА ---
    let rulerModeActive = false;
    let points = [];
    let lineLayer = null, markersLayer = null;
    const speeds = { drone: 180, jet_drone: 450, cruise: 850, ballistic: 9000 };
    function calculateTime(distKm, speed) { if(distKm<=0) return "0 мин"; const hours = distKm/speed; const mins = hours*60; if(mins<1) return "< 1 мин"; if(mins>=60) return `${Math.floor(mins/60)} ч ${Math.floor(mins%60)} мин`; return `${Math.floor(mins)} мин`; }
    function updateRulerDisplay() {
        if(points.length<2) { document.getElementById('distKm').innerText='0'; document.getElementById('timeResult').innerHTML='—'; return; }
        const dist = points[0].getLatLng().distanceTo(points[1].getLatLng())/1000;
        document.getElementById('distKm').innerText=dist.toFixed(1);
        const threat = document.getElementById('threatType').value;
        const timeStr = calculateTime(dist, speeds[threat]);
        document.getElementById('timeResult').innerHTML=timeStr;
    }
    function updateRulerGraphics() {
        if(lineLayer) map.removeLayer(lineLayer);
        if(markersLayer) map.removeLayer(markersLayer);
        if(points.length===0) return;
        markersLayer = L.layerGroup().addTo(map);
        points.forEach(m => markersLayer.addLayer(m));
        if(points.length===2) {
            const latlngs = points.map(p=>p.getLatLng());
            lineLayer = L.polyline(latlngs, { color: '#ffc107', weight: 5, dashArray: '8, 8', opacity: 0.9 }).addTo(map);
        }
        updateRulerDisplay();
    }
    function addRulerPoint(e) {
        if(!rulerModeActive) return;
        if(points.length>=2) clearRuler();
        const marker = L.marker(e.latlng, { draggable: true, icon: L.divIcon({ className: 'ruler-marker', html: `<div style="background:#ffaa33; width:14px; height:14px; border-radius:50%; border:2px solid white; box-shadow:0 0 8px gold;"></div>`, iconSize: [14,14] }) });
        marker.on('dragend', () => updateRulerGraphics());
        points.push(marker);
        updateRulerGraphics();
    }
    function clearRuler() {
        if(lineLayer) map.removeLayer(lineLayer);
        if(markersLayer) map.removeLayer(markersLayer);
        points.forEach(m=>m.remove());
        points=[]; lineLayer=null; markersLayer=null;
        updateRulerDisplay();
    }
    function setRulerMode(active) {
        rulerModeActive = active;
        const btn = document.getElementById('rulerBtn');
        const panel = document.getElementById('rulerPanel');
        if(active) {
            btn.classList.add('active'); panel.classList.add('show');
            map.getContainer().style.cursor = 'crosshair';
            if(polygonsLayer) {
                polygonsLayer.eachLayer(layer => {
                    if(layer._path) layer._path.classList.add('leaflet-interactive-off');
                });
            }
            map.on('click', addRulerPoint);
        } else {
            btn.classList.remove('active'); panel.classList.remove('show');
            map.getContainer().style.cursor = '';
            if(polygonsLayer) {
                polygonsLayer.eachLayer(layer => {
                    if(layer._path) layer._path.classList.remove('leaflet-interactive-off');
                });
            }
            map.off('click', addRulerPoint);
            clearRuler();
        }
    }

    // --- ГРАНИЦЫ ---
    function loadPolygons() {
        const url = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
        const fallback = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
        fetch(url).then(r => r.ok ? r.json() : Promise.reject()).then(data => applyPolygons(data)).catch(() => fetch(fallback).then(r=>r.json()).then(data=>applyPolygons(data)).catch(e=>console.warn("no borders",e)));
    }
    function applyPolygons(geoData) {
        if(polygonsLayer) map.removeLayer(polygonsLayer);
        polygonsLayer = L.geoJSON(geoData, {
            style: (feature) => {
                let name = feature.properties?.name || feature.properties?.NAME || "";
                const norm = normalizeRegionName(name);
                const eff = getEffectiveStatus(norm);
                return { color: "#fff", weight: 1.6, fillColor: getFillColor(eff), fillOpacity: 0.7 };
            },
            onEachFeature: (f, layer) => {
                let name = f.properties?.name || f.properties?.NAME || "";
                if(name) { layer.regionName = name; const norm = normalizeRegionName(name); const eff = getEffectiveStatus(norm); layer.bindPopup(getPopupContent(norm, eff), { className: 'custom-popup' }); }
            }
        }).addTo(map);
        try { map.fitBounds(polygonsLayer.getBounds()); } catch(e) { map.setView([62,105],3.8); }
        document.getElementById('status').innerHTML = "🗺 Границы загружены";
        updateMapAndPanel();
    }

    // --- ЧАСЫ, ТЕМА, КОПИРОВАНИЕ ---
    function updateClock() { const now = new Date(); document.getElementById('liveTime').innerHTML = now.toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'}); document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru', {day:'numeric', month:'long', weekday:'short'}); }
    updateClock(); setInterval(updateClock, 1000);

    const themeBtn = document.getElementById('themeToggleBtn');
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        if(document.body.classList.contains('light-theme')) {
            themeBtn.innerHTML = '<i class="fas fa-sun"></i> Тема';
            setTileLayer(lightTile);
        } else { themeBtn.innerHTML = '<i class="fas fa-moon"></i> Тема'; setTileLayer(darkTile); }
    });

    function showToast(msg) { const old = document.querySelector('.copy-toast'); if(old) old.remove(); const t = document.createElement('div'); t.className='copy-toast'; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    async function copyAlertsList() {
        const active=[];
        for (const [region, st] of Object.entries(regionStatus)) { if(ignoredRegions.includes(region)) continue; if(st.rocket) active.push({name:region,label:'🟤 Ракетная опасность'}); else if(st.droneAlert) active.push({name:region,label:'🔴 Тревога БПЛА (ПВО)'}); else if(st.droneDanger) active.push({name:region,label:'🟡 Опасность БПЛА'}); }
        if(active.length===0) { showToast("Нет активных тревог"); return; }
        const text = `📅 Тревоги на ${new Date().toLocaleString()}\n${active.map(a=>`${a.label}: ${a.name}`).join('\n')}`;
        await navigator.clipboard.writeText(text); showToast(`📋 Скопировано ${active.length} тревог`);
    }

    // --- ИНИЦИАЛИЗАЦИЯ ---
    loadPolygons();
    setTimeout(()=>{ fetchAlerts(); setInterval(fetchAlerts, 60000); }, 800);
    document.getElementById('rulerBtn').addEventListener('click', () => setRulerMode(!rulerModeActive));
    document.getElementById('clearRulerBtn').addEventListener('click', clearRuler);
    document.getElementById('threatType').addEventListener('change', updateRulerDisplay);
    const panel = document.getElementById('alertsPanel');
    document.getElementById('openPanelBtn').addEventListener('click', () => { panel.classList.add('open'); updateAlertsPanel(); });
    document.getElementById('closePanelBtn').addEventListener('click', () => panel.classList.remove('open'));
    document.getElementById('copyAlertsBtn').addEventListener('click', copyAlertsList);
    document.addEventListener('click', (e) => { if(panel.classList.contains('open') && !panel.contains(e.target) && e.target !== document.getElementById('openPanelBtn')) panel.classList.remove('open'); });
    window.addEventListener('resize', () => map.invalidateSize());
})();
</script>
</body>
</html>
