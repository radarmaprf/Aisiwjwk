<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Air Alert Map — Тревоги РФ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .clock { position: fixed; top: 20px; right: 20px; z-index: 2000; background: rgba(10,14,26,0.85); backdrop-filter: blur(8px); border-radius: 20px; padding: 8px 18px; color: #e8eef2; font-family: monospace; text-align: center; border: 1px solid rgba(255,255,255,0.15); }
        .time-main { font-size: 1.8rem; font-weight: 600; line-height: 1; }
        .date { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; text-transform: uppercase; }
        .legend { position: fixed; bottom: 20px; left: 20px; z-index: 2000; background: rgba(10,14,26,0.85); backdrop-filter: blur(8px); border-radius: 12px; padding: 10px 16px; color: #e8eef2; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 24px; height: 16px; border-radius: 4px; }
        
        /* Информация о последнем обновлении (вместо кнопки) */
        .update-info {
            position: fixed; bottom: 20px; right: 20px; z-index: 2000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 40px;
            padding: 8px 20px; color: #ccc; font-size: 0.85rem;
            font-family: monospace; font-weight: normal;
            text-align: center; pointer-events: none;
        }
        
        .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border-radius: 20px; padding: 4px 14px; color: #ccc; font-size: 0.7rem; font-family: monospace; white-space: nowrap; text-align: center; }
        .alert-list-btn { position: fixed; top: 20px; left: 20px; z-index: 2000; background: rgba(220,53,69,0.9); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); border-radius: 40px; padding: 8px 18px; color: white; font-size: 0.9rem; font-weight: bold; cursor: pointer; font-family: monospace; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .alert-list-btn:hover { background: #b02a37; transform: scale(1.02); }
        
        /* Панель инструментов линейки */
        .toolbar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; display: flex; gap: 12px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px); padding: 8px 16px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .tool-btn {
            background: rgba(30,35,50,0.9); border: none; color: white;
            padding: 6px 16px; border-radius: 30px; font-size: 0.85rem;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            font-family: monospace; letter-spacing: 0.5px;
        }
        .tool-btn.active { background: #28a745; box-shadow: 0 0 8px #28a745; }
        .tool-btn:hover { background: #28a745; transform: scale(1.02); }
        .tool-btn.danger { background: #dc3545; }
        .tool-btn.danger:hover { background: #b02a37; }
        
        /* Панель с результатами измерения */
        .ruler-panel {
            position: fixed; top: 80px; left: 20px; z-index: 2100;
            background: rgba(10,14,26,0.95); backdrop-filter: blur(12px);
            border-radius: 16px; padding: 12px 18px; width: 260px;
            border: 1px solid rgba(255,255,255,0.2); display: none;
            flex-direction: column; gap: 10px; font-family: monospace;
        }
        .ruler-panel.show { display: flex; }
        .ruler-panel h4 { margin: 0 0 5px 0; color: #ffc107; font-size: 1rem; }
        .threat-select {
            background: #1a1f2e; color: white; border: 1px solid #555;
            padding: 6px; border-radius: 8px; font-size: 0.8rem;
        }
        .distance-info { background: #00000055; padding: 8px; border-radius: 8px; margin-top: 5px; }
        .distance-info p { margin: 4px 0; font-size: 0.75rem; }
        .time-result { font-size: 1.1rem; font-weight: bold; color: #ffc107; text-align: center; }
        
        /* Панель списка тревог */
        .alerts-panel {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: rgba(10,14,26,0.95); backdrop-filter: blur(12px);
            z-index: 3000; transition: left 0.3s ease;
            border-right: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; font-family: monospace;
            box-shadow: 2px 0 20px rgba(0,0,0,0.5);
        }
        .alerts-panel.open { left: 0; }
        .panel-header { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.2); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); }
        .panel-header h3 { color: #ffc107; font-size: 1.2rem; margin: 0; }
        .panel-actions { display: flex; gap: 12px; }
        .copy-btn { background: rgba(255,255,255,0.15); border: none; color: white; font-size: 1.1rem; cursor: pointer; padding: 4px 10px; border-radius: 20px; transition: 0.2s; font-family: monospace; }
        .copy-btn:hover { background: #28a745; }
        .close-panel { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; line-height: 1; }
        .close-panel:hover { color: #ff6b6b; }
        .panel-content { flex: 1; overflow-y: auto; padding: 12px 8px; }
        .alert-region-item { background: rgba(30,35,50,0.7); margin-bottom: 10px; padding: 12px; border-radius: 12px; border-left: 4px solid; }
        .alert-region-item.rocket { border-left-color: #8B0000; }
        .alert-region-item.droneAlert { border-left-color: #dc3545; }
        .alert-region-item.droneDanger { border-left-color: #ffc107; }
        .region-name { font-weight: bold; font-size: 1rem; margin-bottom: 5px; color: #fff; }
        .alert-type { font-size: 0.8rem; display: inline-block; padding: 2px 8px; border-radius: 20px; }
        .alert-type.rocket { background: #8B000030; color: #ffaaaa; border: 1px solid #8B0000; }
        .alert-type.droneAlert { background: #dc354520; color: #ff8888; border: 1px solid #dc3545; }
        .alert-type.droneDanger { background: #ffc10720; color: #ffc107; border: 1px solid #ffc107; }
        .empty-message { color: #aaa; text-align: center; padding: 30px 20px; font-style: italic; }
        .copy-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #28a745; color: white; padding: 6px 16px; border-radius: 30px; font-size: 0.85rem; z-index: 4000; font-family: monospace; animation: fadeOut 2s forwards; pointer-events: none; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .custom-popup .leaflet-popup-content-wrapper { background: #1a1f2e; color: #e8eef2; border-radius: 12px; border-left: 4px solid; }
        .leaflet-control-attribution { display: none !important; }
        .leaflet-interactive-off {
            pointer-events: none !important;
        }
        @media (max-width: 600px) {
            .time-main { font-size: 1.2rem; }
            .clock { padding: 4px 12px; top: 10px; right: 10px; }
            .legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
            .update-info { bottom: 10px; right: 10px; padding: 6px 14px; font-size: 0.7rem; }
            .alert-list-btn { top: 10px; left: 10px; padding: 5px 14px; font-size: 0.8rem; }
            .alerts-panel { width: 85%; left: -85%; }
            .copy-btn { font-size: 0.9rem; padding: 2px 8px; }
            .toolbar { top: 70px; padding: 4px 10px; gap: 6px; }
            .tool-btn { padding: 4px 12px; font-size: 0.7rem; }
            .ruler-panel { width: 220px; top: 110px; left: 10px; }
        }
    </style>
</head>
<body>
<div class="clock"><div class="time-main" id="liveTime">--:--</div><div class="date" id="liveDate">--</div></div>
<button class="alert-list-btn" id="openPanelBtn">⚠️ Список тревог</button>

<!-- Панель инструментов линейки -->
<div class="toolbar">
    <button id="rulerBtn" class="tool-btn">📏 Линейка (on/off)</button>
    <button id="clearRulerBtn" class="tool-btn danger">🗑 Сбросить</button>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>🔴 Тревога БПЛА (фиксация/ПВО)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #8B0000;"></div> <span>🟤 Ракетная опасность</span></div>
</div>

<!-- Вместо кнопки обновления – блок с информацией о последнем обновлении -->
<div class="update-info" id="lastUpdateInfo">📅 Последнее обновление: --:--</div>
<div class="status" id="status">Загрузка карты...</div>

<!-- Панель линейки -->
<div id="rulerPanel" class="ruler-panel">
    <h4>📏 Измерение угрозы</h4>
    <select id="threatType" class="threat-select">
        <option value="drone">🛩 Обычный БПЛА (180 км/ч)</option>
        <option value="jet_drone">🚀 Реактивный БПЛА (450 км/ч)</option>
        <option value="cruise">✈️ Крылатая ракета (850 км/ч)</option>
        <option value="ballistic">💥 Баллистическая ракета (9000 км/ч)</option>
    </select>
    <div class="distance-info">
        <p>📏 Расстояние: <span id="distKm">0</span> км</p>
        <p>⏱ Время подлёта:</p>
        <div id="timeResult" class="time-result">—</div>
    </div>
    <small style="font-size:0.65rem; opacity:0.7;">★ Кликните по карте 2 раза — поставьте точки A и B</small>
</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>
<div id="alertsPanel" class="alerts-panel">
    <div class="panel-header"><h3>🚨 Регионы с тревогами</h3><div class="panel-actions"><button class="copy-btn" id="copyAlertsBtn">📋 Копировать</button><button class="close-panel" id="closePanelBtn">&times;</button></div></div>
    <div class="panel-content" id="panelContent"><div class="empty-message">Нет активных тревог</div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
    // ---------- 1. КАРТА ----------
    const map = L.map('map').setView([62, 105], 3.8);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '', subdomains: 'abcd', maxZoom: 10, minZoom: 2
    }).addTo(map);

    // ---------- 2. ГЛОБАЛЬНЫЕ ДАННЫЕ ----------
    let polygonsLayer = null;          // слой с границами
    let regionStatus = {};             // { "Регион": { rocket, droneAlert, droneDanger } }
    let lastUpdateTime = null;
    const colors = { clear: "#6c757d", droneDanger: "#ffc107", droneAlert: "#dc3545", rocket: "#8B0000" };
    
    // Список всех регионов, которые могут прийти из alerts.json (на основе Python-скрипта)
    const allRegionNames = [
        "Москва", "Московская область", "Санкт-Петербург", "Ленинградская область",
        "Белгородская область", "Брянская область", "Владимирская область", "Воронежская область",
        "Ивановская область", "Калужская область", "Костромская область", "Курская область",
        "Липецкая область", "Нижегородская область", "Новгородская область", "Орловская область",
        "Пензенская область", "Псковская область", "Рязанская область", "Смоленская область",
        "Тамбовская область", "Тверская область", "Тульская область", "Ярославская область",
        "Краснодарский край", "Ставропольский край", "Ростовская область", "Волгоградская область",
        "Татарстан", "Башкортостан", "Марий Эл", "Чувашская Республика", "Республика Мордовия",
        "Удмуртская Республика", "Самарская область", "Саратовская область", "Ульяновская область",
        "Свердловская область", "Челябинская область", "Курганская область", "Оренбургская область",
        "Пермский край", "Новосибирская область", "Томская область", "Кемеровская область",
        "Иркутская область", "Красноярский край", "Алтайский край", "Забайкальский край",
        "Приморский край", "Хабаровский край", "Амурская область", "Сахалинская область",
        "Магаданская область", "Камчатский край", "Мурманская область", "Крым", "Дагестан",
        "Республика Карелия", "Республика Коми", "Республика Саха (Якутия)", "ХМАО", "ЯНАО", "Адыгея"
    ];
    // Нормализация названий из GeoJSON
    const geoNameMapping = {
        "Чувашская Республика": "Чувашская Республика", "Республика Татарстан": "Татарстан",
        "Республика Башкортостан": "Башкортостан", "Удмуртская Республика": "Удмуртская Республика",
        "Республика Мордовия": "Республика Мордовия", "Республика Марий Эл": "Марий Эл",
        "Чеченская Республика": "Чечня", "Республика Дагестан": "Дагестан",
        "Республика Адыгея": "Адыгея", "Республика Карелия": "Республика Карелия",
        "Республика Коми": "Республика Коми", "Ямало-Ненецкий АО": "ЯНАО",
        "Ханты-Мансийский АО": "ХМАО", "г. Москва": "Москва", "Москва": "Москва",
        "Санкт-Петербург": "Санкт-Петербург", "Республика Крым": "Крым"
    };
    function normalizeRegionName(geoName) {
        return geoNameMapping[geoName] || geoName;
    }
    
    // Игнорируемые регионы (никогда не показываем тревоги)
    const ignoredRegions = ["Астраханская область", "Архангельская область", "Омская область"];
    
    // Функция обновления индикатора последнего обновления
    function updateLastUpdateInfo() {
        const infoDiv = document.getElementById('lastUpdateInfo');
        if (lastUpdateTime) {
            const timeStr = lastUpdateTime.toLocaleTimeString();
            infoDiv.innerHTML = `📅 Последнее обновление: ${timeStr}`;
        } else {
            infoDiv.innerHTML = `📅 Последнее обновление: --:--`;
        }
    }
    
    // ---------- 3. ЗАГРУЗКА alerts.json ----------
    async function fetchAlerts() {
        try {
            const resp = await fetch("alerts.json?" + Date.now());
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            if (data && data.regions) {
                // Обновляем текущий статус
                for (const [region, st] of Object.entries(data.regions)) {
                    if (ignoredRegions.includes(region)) continue;
                    regionStatus[region] = {
                        rocket: !!st.rocket,
                        droneAlert: !!st.droneAlert,
                        droneDanger: !!st.droneDanger
                    };
                }
                // Для регионов, отсутствующих в alerts.json, ставим false (отбой)
                for (const region of allRegionNames) {
                    if (!regionStatus[region]) {
                        regionStatus[region] = { rocket: false, droneAlert: false, droneDanger: false };
                    }
                }
                lastUpdateTime = data.last_updated ? new Date(data.last_updated) : new Date();
                updateMapAndPanel();
                updateLastUpdateInfo();  // обновляем отображение времени
                const statusDiv = document.getElementById('status');
                const timeStr = lastUpdateTime.toLocaleTimeString();
                statusDiv.innerHTML = `✅ Данные от ${timeStr}`;
                setTimeout(() => {
                    if (statusDiv.innerHTML.startsWith('✅')) 
                        statusDiv.innerHTML = `Актуально на ${timeStr}`;
                }, 3000);
            } else {
                throw new Error("Неверный формат alerts.json");
            }
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerHTML = `⚠️ Ошибка загрузки: ${err.message}`;
        }
    }

    // ---------- 4. ОТРИСОВКА КАРТЫ И ПАНЕЛИ ----------
    function getEffectiveStatus(region) {
        const st = regionStatus[region] || { rocket: false, droneAlert: false, droneDanger: false };
        return st;
    }
    function getFillColor(effective) {
        if (effective.rocket) return colors.rocket;
        if (effective.droneAlert) return colors.droneAlert;
        if (effective.droneDanger) return colors.droneDanger;
        return colors.clear;
    }
    function getPopupContent(regionName, effective) {
        let text = "", color = "";
        if (effective.rocket) { text = "🟤 РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!"; color = "#ffaaaa"; }
        else if (effective.droneAlert) { text = "🔴 ТРЕВОГА БПЛА! Фиксация / Работа ПВО"; color = "#ff8888"; }
        else if (effective.droneDanger) { text = "🟡 Опасность БПЛА в регионе"; color = "#ffc107"; }
        else { text = "⚪ Отбой / Спокойно"; color = "#adb5bd"; }
        return `<div style="font-family:'Segoe UI';min-width:160px;"><b>${regionName}</b><br><span style="color:${color}">${text}</span></div>`;
    }
    function updateMapAndPanel() {
        if (!polygonsLayer) return;
        polygonsLayer.eachLayer(layer => {
            const geoName = layer.regionName;
            if (!geoName) return;
            const normName = normalizeRegionName(geoName);
            const effective = getEffectiveStatus(normName);
            layer.setStyle({ fillColor: getFillColor(effective), fillOpacity: 0.7 });
            const popup = layer.getPopup();
            if (popup) popup.setContent(getPopupContent(normName, effective));
        });
        updateAlertsPanel();
    }
    function updateAlertsPanel() {
        const panelDiv = document.getElementById('panelContent');
        const active = [];
        for (const [region, st] of Object.entries(regionStatus)) {
            if (ignoredRegions.includes(region)) continue;
            if (st.rocket) active.push({ name: region, type: 'rocket', label: '🟤 Ракетная опасность', priority: 1 });
            else if (st.droneAlert) active.push({ name: region, type: 'droneAlert', label: '🔴 Тревога БПЛА (фиксация/ПВО)', priority: 2 });
            else if (st.droneDanger) active.push({ name: region, type: 'droneDanger', label: '🟡 Опасность БПЛА', priority: 3 });
        }
        if (active.length === 0) {
            panelDiv.innerHTML = '<div class="empty-message">✨ Нет активных тревог</div>';
            return;
        }
        active.sort((a,b) => a.priority - b.priority);
        panelDiv.innerHTML = active.map(r => `
            <div class="alert-region-item ${r.type}">
                <div class="region-name">${r.name}</div>
                <div class="alert-type ${r.type}">${r.label}</div>
            </div>
        `).join('');
    }
    
    // ---------- 5. КОПИРОВАНИЕ СПИСКА ----------
    function getCurrentDateTimeString() {
        const now = new Date();
        return `${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getFullYear()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    }
    async function copyAlertsList() {
        const active = [];
        for (const [region, st] of Object.entries(regionStatus)) {
            if (ignoredRegions.includes(region)) continue;
            if (st.rocket) active.push({ name: region, label: '🟤 Ракетная опасность', priority: 1 });
            else if (st.droneAlert) active.push({ name: region, label: '🔴 Тревога БПЛА (фиксация/работа ПВО)', priority: 2 });
            else if (st.droneDanger) active.push({ name: region, label: '🟡 Опасность БПЛА', priority: 3 });
        }
        if (active.length === 0) { showToast("✨ Нет активных тревог"); return; }
        active.sort((a,b) => a.priority - b.priority);
        const lines = active.map(a => `${a.label}: ${a.name}`);
        const text = `📅 Активные тревоги на ${getCurrentDateTimeString()}\n${lines.join('\n')}`;
        try { await navigator.clipboard.writeText(text); showToast(`📋 Скопировано ${active.length} тревог`); }
        catch { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast(`📋 Скопировано ${active.length} тревог`); }
    }
    function showToast(msg) {
        const old = document.querySelector('.copy-toast');
        if (old) old.remove();
        const toast = document.createElement('div'); toast.className = 'copy-toast'; toast.textContent = msg;
        document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000);
    }
    
    // ---------- 6. ЛИНЕЙКА (измерение расстояний и времени) ----------
    let rulerModeActive = false;
    let points = [];          // массив маркеров (L.marker)
    let lineLayer = null;
    let markersLayer = null;
    const speeds = { drone: 180, jet_drone: 450, cruise: 850, ballistic: 9000 };
    
    function calculateTime(distanceKm, speedKmh) {
        if (distanceKm <= 0) return "0 мин";
        const hours = distanceKm / speedKmh;
        const totalMinutes = hours * 60;
        if (totalMinutes < 1) return "< 1 мин";
        const hrs = Math.floor(totalMinutes / 60);
        const mins = Math.floor(totalMinutes % 60);
        if (hrs > 0) return `${hrs} ч ${mins} мин`;
        return `${mins} мин`;
    }
    function updateRulerDisplay() {
        if (points.length < 2) {
            document.getElementById('distKm').innerText = '0';
            document.getElementById('timeResult').innerHTML = '—';
            return;
        }
        const dist = points[0].getLatLng().distanceTo(points[1].getLatLng()) / 1000;
        document.getElementById('distKm').innerText = dist.toFixed(1);
        const threat = document.getElementById('threatType').value;
        const timeStr = calculateTime(dist, speeds[threat]);
        document.getElementById('timeResult').innerHTML = timeStr;
    }
    function updateRulerGraphics() {
        if (lineLayer) map.removeLayer(lineLayer);
        if (markersLayer) map.removeLayer(markersLayer);
        if (points.length === 0) return;
        markersLayer = L.layerGroup().addTo(map);
        points.forEach(m => markersLayer.addLayer(m));
        if (points.length === 2) {
            const latlngs = points.map(p => p.getLatLng());
            lineLayer = L.polyline(latlngs, { color: '#ffc107', weight: 4, dashArray: '8, 6' }).addTo(map);
        }
        updateRulerDisplay();
    }
    function addRulerPoint(e) {
        if (!rulerModeActive) return;
        if (points.length >= 2) clearRuler();
        const marker = L.marker(e.latlng, {
            draggable: true,
            icon: L.divIcon({ className: 'ruler-marker', html: `<div style="background:#ffc107; width:12px; height:12px; border-radius:50%; border:2px solid white;"></div>`, iconSize: [12,12] })
        });
        marker.on('dragend', () => { updateRulerGraphics(); });
        points.push(marker);
        updateRulerGraphics();
    }
    function clearRuler() {
        if (lineLayer) map.removeLayer(lineLayer);
        if (markersLayer) map.removeLayer(markersLayer);
        points.forEach(m => m.remove());
        points = [];
        lineLayer = null;
        markersLayer = null;
        updateRulerDisplay();
    }
    function setRulerMode(active) {
        rulerModeActive = active;
        const rulerBtn = document.getElementById('rulerBtn');
        const panel = document.getElementById('rulerPanel');
        if (active) {
            rulerBtn.classList.add('active');
            panel.classList.add('show');
            map.getContainer().style.cursor = 'crosshair';
            if (polygonsLayer) {
                polygonsLayer.eachLayer(layer => {
                    if (layer._path) layer._path.classList.add('leaflet-interactive-off');
                });
            }
            map.on('click', addRulerPoint);
        } else {
            rulerBtn.classList.remove('active');
            panel.classList.remove('show');
            map.getContainer().style.cursor = '';
            if (polygonsLayer) {
                polygonsLayer.eachLayer(layer => {
                    if (layer._path) layer._path.classList.remove('leaflet-interactive-off');
                });
            }
            map.off('click', addRulerPoint);
            clearRuler();
        }
    }
    
    // ---------- 7. ЗАГРУЗКА ГРАНИЦ (GeoJSON) ----------
    function loadPolygons() {
        const url = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
        const fallback = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
        fetch(url).then(r => r.ok ? r.json() : Promise.reject())
            .then(data => applyPolygons(data))
            .catch(() => fetch(fallback).then(r => r.json()).then(data => applyPolygons(data))
            .catch(e => console.warn("Границы не загружены", e)));
    }
    function applyPolygons(geoData) {
        if (polygonsLayer) map.removeLayer(polygonsLayer);
        polygonsLayer = L.geoJSON(geoData, {
            style: (feature) => {
                let name = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                const norm = normalizeRegionName(name);
                const effective = getEffectiveStatus(norm);
                return { color: "#fff", weight: 2.2, fillColor: getFillColor(effective), fillOpacity: 0.7, smoothFactor: 0.5 };
            },
            onEachFeature: (f, layer) => {
                let name = f.properties?.name || f.properties?.NAME || f.properties?.admin_name || "";
                if (name) {
                    const norm = normalizeRegionName(name);
                    layer.regionName = norm;
                    const effective = getEffectiveStatus(norm);
                    layer.bindPopup(getPopupContent(norm, effective), { className: 'custom-popup' });
                }
            }
        }).addTo(map);
        try { map.fitBounds(polygonsLayer.getBounds()); } catch(e) { map.setView([62, 105], 3.8); }
        document.getElementById('status').innerHTML = 'Границы загружены';
        updateMapAndPanel();
    }
    
    // ---------- 8. ЧАСЫ И АВТООБНОВЛЕНИЕ ----------
    function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').innerHTML = now.toLocaleTimeString('ru', { hour:'2-digit', minute:'2-digit' });
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru', { day:'numeric', month:'long', weekday:'long' });
    }
    updateClock(); setInterval(updateClock, 60000);
    
    // Инициализация: загружаем границы, потом данные, потом автообновление
    loadPolygons();
    setTimeout(() => {
        fetchAlerts();
        setInterval(fetchAlerts, 60000); // каждую минуту
    }, 1000);
    
    // ---------- 9. ОБРАБОТЧИКИ КНОПОК (без кнопки обновления) ----------
    document.getElementById('rulerBtn').addEventListener('click', () => setRulerMode(!rulerModeActive));
    document.getElementById('clearRulerBtn').addEventListener('click', () => clearRuler());
    document.getElementById('threatType').addEventListener('change', () => updateRulerDisplay());
    
    const panel = document.getElementById('alertsPanel');
    document.getElementById('openPanelBtn').addEventListener('click', () => { panel.classList.add('open'); updateAlertsPanel(); });
    document.getElementById('closePanelBtn').addEventListener('click', () => panel.classList.remove('open'));
    document.getElementById('copyAlertsBtn').addEventListener('click', () => copyAlertsList());
    document.addEventListener('click', (e) => {
        if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== document.getElementById('openPanelBtn'))
            panel.classList.remove('open');
    });
    window.addEventListener('resize', () => map.invalidateSize());
})();
</script>
</body>
</html>
