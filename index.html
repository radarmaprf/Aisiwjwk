<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Air Alert Map — Тревоги РФ</title>
    
    <!-- PWA manifest и иконки -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Air Alert Map">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* Все ваши стили полностью сохранены, я их не менял, только добавил стиль для текстовых меток */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            overflow: hidden;
            transition: background 0.3s ease;
        }
        body.light-theme { background: #eef2f5; }
        body.light-theme .clock,
        body.light-theme .legend,
        body.light-theme .update-info,
        body.light-theme .ruler-panel,
        body.light-theme .forecast-panel,
        body.light-theme .alerts-panel,
        body.light-theme .toolbar,
        body.light-theme .settings-modal,
        body.light-theme .install-modal {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-color: rgba(0, 0, 0, 0.2);
            color: #1a1e2c;
        }
        body.light-theme .time-main { background: linear-gradient(135deg, #222, #555); -webkit-background-clip: text; background-clip: text; color: transparent; }
        body.light-theme .tool-btn { background: rgba(0, 0, 0, 0.1); color: #111; }
        body.light-theme .alert-region-item { background: rgba(0, 0, 0, 0.05); }
        body.light-theme .region-name { color: #111; }
        body.light-theme .legend { color: #1a1e2c; }
        body.light-theme .forecast-panel { background: rgba(255, 255, 255, 0.95); color: #1a1e2c; }
        body.light-theme .forecast-panel h4 { color: #b13b00; }
        body.light-theme .forecast-item-high { color: #cc0000; }
        body.light-theme .forecast-item-mid { color: #cc7a00; }
        body.light-theme .forecast-item-low { color: #2d862d; }
        body.light-theme .distance-info { color: #222; background: rgba(0,0,0,0.05); }
        body.light-theme .time-result { color: #b13b00; }
        body.light-theme .install-step-card { background: rgba(0,0,0,0.05); }
        body.light-theme .install-modal-content { background: #ffffff; color: #111; border: 1px solid #ccc; }
        body.light-theme .install-modal-content h3 { color: #b13b00; }
        body.light-theme .install-step-text strong { color: #b13b00; }
        body.light-theme .close-install { background: #28a745; color: white; }
        body.light-theme .settings-modal-content { background: #ffffff; color: #111; }
        body.light-theme .setting-item { color: #111; }
        body.light-theme .device-buttons button { background: #e0e0e0; color: #111; }
        body.light-theme .install-dot { background: #ccc; }
        body.light-theme .install-dot.active { background: #b13b00; }
        
        .clock, .legend, .update-info, .ruler-panel, .forecast-panel, .toolbar, .settings-modal, .install-modal {
            background: rgba(10,14,26,0.95);
            backdrop-filter: blur(12px);
            color: #e8eef2;
        }
        .alerts-panel {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: #0a0e1a;
            z-index: 3000; transition: left 0.3s ease;
            border-right: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column;
            box-shadow: 2px 0 20px rgba(0,0,0,0.5);
        }
        body.light-theme .alerts-panel { background: #eef2f5; }
        .alerts-panel.open { left: 0; }
        .panel-header {
            padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.2);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.5);
        }
        body.light-theme .panel-header { background: rgba(0,0,0,0.1); }
        .panel-header h3 { color: #ffc107; font-size: 1.2rem; margin: 0; }
        .panel-actions { display: flex; gap: 12px; }
        .copy-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 4px 10px; border-radius: 20px; cursor: pointer; }
        .copy-btn:hover { background: #28a745; }
        .close-panel { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }
        .close-panel:hover { color: #ff6b6b; }
        .panel-content { flex: 1; overflow-y: auto; padding: 12px 8px; }
        .alert-region-item {
            background: rgba(30,35,50,0.7); margin-bottom: 10px; padding: 12px;
            border-radius: 12px; border-left: 4px solid;
            cursor: pointer;
            transition: 0.2s;
        }
        .alert-region-item:hover { transform: translateX(5px); background: rgba(30,35,50,0.9); }
        body.light-theme .alert-region-item:hover { background: rgba(0,0,0,0.2); }
        .alert-region-item.rocket { border-left-color: #8B0000; }
        .alert-region-item.droneAlert { border-left-color: #dc3545; }
        .alert-region-item.droneDanger { border-left-color: #ffc107; }
        .region-name { font-weight: bold; margin-bottom: 5px; color: #fff; }
        body.light-theme .region-name { color: #111; }
        .alert-type { font-size: 0.8rem; display: inline-block; padding: 2px 8px; border-radius: 20px; }
        .empty-message { color: #aaa; text-align: center; padding: 30px 20px; }
        
        .forecast-panel { color: #e8eef2; }
        .forecast-panel h4 { color: #ffc107; }
        .forecast-list { max-height: 200px; overflow-y: auto; font-size: 0.8rem; }
        .forecast-item { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 8px; }
        .forecast-item-high { color: #ff9999; }
        .forecast-item-mid { color: #ffcc66; }
        .forecast-item-low { color: #99ff99; }
        .forecast-empty { font-style: italic; font-size: 0.75rem; text-align: center; padding: 10px; color: #aaa; }
        
        .clock {
            position: fixed; z-index: 2000;
            border-radius: 20px;
            font-family: monospace; text-align: center; border: 1px solid rgba(255,255,255,0.15);
        }
        .time-main { font-weight: 600; background: linear-gradient(135deg, #fff, #ffd966); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .date { opacity: 0.7; margin-top: 4px; text-transform: uppercase; }

        .settings-gear {
            position: fixed; z-index: 2000;
            background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s; color: #ffd966;
        }
        .settings-gear:hover { background: #28a745; transform: rotate(30deg); color: white; }

        .legend {
            position: fixed; bottom: 20px; left: 20px; z-index: 2000;
            border-radius: 12px; padding: 10px 16px; font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 6px;
            pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 24px; height: 16px; border-radius: 4px; }

        .update-info {
            position: fixed; bottom: 20px; right: 20px; z-index: 2000;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 40px;
            padding: 6px 16px; font-size: 0.75rem;
            pointer-events: none;
        }

        .alert-list-btn {
            position: fixed; top: 20px; left: 20px; z-index: 2100;
            background: rgba(220,53,69,0.9); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 40px;
            padding: 8px 18px;
            color: white; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        .alert-list-btn:hover { background: #b02a37; transform: scale(1.02); }

        .toolbar {
            position: fixed; left: 50%; transform: translateX(-50%);
            z-index: 2000; display: flex;
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .tool-btn {
            background: rgba(30,35,50,0.9); border: none; color: white;
            border-radius: 30px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .tool-btn:hover { background: #28a745; transform: scale(1.02); }
        .tool-btn.danger { background: #dc3545; }
        .tool-btn.danger:hover { background: #b02a37; }

        .ruler-panel {
            position: fixed; left: 20px; z-index: 2100;
            border-radius: 16px; padding: 12px 18px;
            border: 1px solid rgba(255,255,255,0.2); display: none;
            flex-direction: column; gap: 10px;
        }
        .ruler-panel.show { display: flex; }
        .ruler-panel h4 { margin: 0 0 5px 0; color: #ffc107; }
        .threat-select { background: #1a1f2e; color: white; border: 1px solid #555; padding: 6px; border-radius: 8px; }
        .distance-info { padding: 8px; border-radius: 8px; margin-top: 5px; }
        .distance-info p { margin: 4px 0; font-size: 0.75rem; }
        .time-result { font-size: 1.1rem; font-weight: bold; text-align: center; }

        .forecast-panel {
            position: fixed; right: 20px; z-index: 2100;
            border-radius: 16px; padding: 12px 18px;
            border: 1px solid rgba(255,215,0,0.5);
            display: none;
            flex-direction: column; gap: 10px;
            pointer-events: none;
        }
        .forecast-panel h4 { margin: 0; font-size: 1rem; display: flex; align-items: center; gap: 6px; }

        .copy-toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #28a745; color: white; padding: 6px 16px;
            border-radius: 30px; animation: fadeOut 2s forwards;
            pointer-events: none; z-index: 4000;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .custom-popup .leaflet-popup-content-wrapper { background: #1a1f2e; color: #e8eef2; border-radius: 12px; border-left: 4px solid; }
        .leaflet-control-attribution { display: none; }
        .leaflet-interactive-off { pointer-events: none !important; }

        /* Модальное окно настроек и установки */
        .settings-modal, .install-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .settings-modal-content, .install-modal-content {
            background: #1e243b;
            border-radius: 32px;
            padding: 20px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 1px solid #ffc10760;
        }
        .install-modal-content {
            width: 360px;
            max-width: 90vw;
        }
        .install-modal-content h3 {
            color: #ffc107;
            margin-bottom: 16px;
            text-align: center;
            font-size: 1.3rem;
        }
        .install-carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            gap: 20px;
            padding: 10px 5px 20px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .install-carousel::-webkit-scrollbar {
            height: 4px;
        }
        .install-carousel::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        .install-carousel::-webkit-scrollbar-thumb {
            background: #ffc107;
            border-radius: 4px;
        }
        .install-step-card {
            flex: 0 0 85%;
            scroll-snap-align: start;
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .install-step-icon {
            font-size: 3rem;
            background: rgba(255,193,7,0.2);
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 8px;
        }
        .install-step-text p {
            margin: 8px 0;
            font-size: 0.9rem;
            line-height: 1.3;
        }
        .install-step-text strong {
            color: #ffc107;
        }
        .install-step-img {
            margin-top: 10px;
            font-size: 0.8rem;
            opacity: 0.8;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 8px;
            width: 100%;
        }
        .install-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 16px 0 8px;
        }
        .install-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
            transition: 0.2s;
            cursor: pointer;
        }
        .install-dot.active {
            background: #ffc107;
            width: 20px;
            border-radius: 4px;
        }
        .close-install {
            margin-top: 16px;
            width: 100%;
            padding: 10px;
            background: #28a745;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .install-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 12px;
            opacity: 0.7;
        }

        .settings-modal-content {
            width: 300px;
        }
        .settings-modal-content h3 { color: #ffc107; margin-bottom: 16px; text-align: center; font-size: 1.2rem; }
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            color: white;
            font-size: 0.9rem;
        }
        .setting-item input { width: 18px; height: 18px; cursor: pointer; }
        .device-selector { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.2); }
        .device-selector p { color: #ffc107; margin-bottom: 8px; font-size: 0.9rem; }
        .device-buttons { display: flex; gap: 8px; }
        .device-buttons button {
            background: #2a2f44;
            border: none;
            padding: 6px 0;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            flex: 1;
            font-size: 0.8rem;
        }
        .device-buttons button:hover { background: #28a745; }
        .close-settings {
            margin-top: 16px;
            width: 100%;
            padding: 8px;
            background: #dc3545;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* Адаптация под устройства (классы) */
        body.device-phone .clock { top: 12px; right: 60px; padding: 4px 10px; }
        body.device-phone .time-main { font-size: 1.2rem; }
        body.device-phone .settings-gear { top: 12px; right: 12px; width: 36px; height: 36px; font-size: 1.2rem; }
        body.device-phone .alert-list-btn { top: 12px; left: 12px; padding: 4px 10px; font-size: 0.7rem; }
        body.device-phone .toolbar { top: 65px; padding: 4px 8px; gap: 6px; }
        body.device-phone .tool-btn { padding: 4px 8px; font-size: 0.65rem; gap: 3px; }
        body.device-phone .ruler-panel, body.device-phone .forecast-panel { width: 260px; top: 100px; max-width: 90vw; padding: 10px; }
        body.device-phone .ruler-panel h4 { font-size: 0.9rem; }
        body.device-phone .threat-select { padding: 4px; font-size: 0.7rem; }
        body.device-phone .distance-info p { font-size: 0.7rem; margin: 2px 0; }
        body.device-phone .time-result { font-size: 0.9rem; }
        body.device-phone .legend { bottom: 8px; left: 8px; padding: 6px 10px; font-size: 0.6rem; }
        body.device-phone .update-info { bottom: 8px; right: 8px; padding: 4px 10px; font-size: 0.65rem; }
        body.device-phone .alerts-panel { width: 85%; left: -85%; }
        body.device-phone .alerts-panel.open { left: 0 !important; display: flex !important; z-index: 4000 !important; }
        body.device-phone .settings-modal-content, body.device-phone .install-modal-content { width: 90%; max-width: 320px; padding: 16px; }
        body.device-phone .install-step-card { flex: 0 0 90%; }
        
        body.device-tablet .clock { top: 18px; right: 70px; padding: 6px 14px; }
        body.device-tablet .time-main { font-size: 1.6rem; }
        body.device-tablet .settings-gear { top: 18px; right: 18px; width: 40px; height: 40px; font-size: 1.4rem; }
        body.device-tablet .alert-list-btn { top: 18px; left: 18px; padding: 6px 14px; font-size: 0.85rem; }
        body.device-tablet .toolbar { top: 20px; padding: 6px 12px; gap: 8px; }
        body.device-tablet .tool-btn { padding: 5px 12px; font-size: 0.75rem; }
        body.device-tablet .ruler-panel, body.device-tablet .forecast-panel { width: 240px; top: 85px; }
        body.device-tablet .legend { bottom: 15px; left: 15px; padding: 8px 12px; font-size: 0.7rem; }
        body.device-tablet .update-info { bottom: 15px; right: 15px; padding: 5px 14px; font-size: 0.7rem; }
        body.device-tablet .settings-modal-content, body.device-tablet .install-modal-content { width: 400px; }
        
        body.device-computer .clock { top: 20px; right: 80px; padding: 8px 18px; }
        body.device-computer .time-main { font-size: 1.8rem; }
        body.device-computer .settings-gear { top: 20px; right: 20px; width: 44px; height: 44px; font-size: 1.6rem; }
        body.device-computer .alert-list-btn { top: 20px; left: 20px; padding: 8px 18px; font-size: 0.9rem; }
        body.device-computer .toolbar { top: 20px; padding: 8px 16px; gap: 12px; }
        body.device-computer .tool-btn { padding: 6px 16px; font-size: 0.85rem; }
        body.device-computer .ruler-panel, body.device-computer .forecast-panel { width: 260px; top: 80px; }
        body.device-computer .legend { bottom: 20px; left: 20px; padding: 10px 16px; font-size: 0.75rem; }
        body.device-computer .update-info { bottom: 20px; right: 20px; padding: 6px 16px; font-size: 0.75rem; }
        body.device-computer .settings-modal-content, body.device-computer .install-modal-content { width: 400px; }
        
        /* Стиль для текстовых меток регионов */
        .region-label {
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 12px;
            white-space: nowrap;
            font-family: 'Segoe UI', sans-serif;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(2px);
        }
        body.light-theme .region-label {
            color: #111;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.8), -1px -1px 0 rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.7);
            border-color: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
<div class="clock"><div class="time-main" id="liveTime">--:--</div><div class="date" id="liveDate">--</div></div>
<div class="settings-gear" id="settingsGear">⚙️</div>
<button class="alert-list-btn" id="openPanelBtn">⚠️ Список тревог</button>

<div class="toolbar" id="toolbar">
    <button id="installBtn" class="tool-btn">📱 Установить</button>
    <button id="rulerBtn" class="tool-btn">📏 Линейка</button>
    <button id="forecastToggleBtn" class="tool-btn">🔮 Прогноз</button>
    <button id="epicenterBtn" class="tool-btn">🎯 Эпицентр</button>
    <button id="clearRulerBtn" class="tool-btn danger">🗑 Сброс</button>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background:#6c757d;"></div> <span>⚪ Безопасно</span></div>
    <div class="legend-item"><div class="legend-color" style="background:#ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background:#dc3545;"></div> <span>🔴 Тревога БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background:#8B0000;"></div> <span>🟤 Ракетная угроза</span></div>
</div>

<div class="update-info" id="lastUpdateInfo">📅 Последнее обновление: --:--</div>

<div id="forecastPanel" class="forecast-panel" style="display: none;">
    <h4>🔮 Прогноз угроз</h4>
    <div id="forecastList" class="forecast-list">Загрузка...</div>
</div>

<div id="rulerPanel" class="ruler-panel">
    <h4>📏 Измерение угрозы</h4>
    <select id="threatType">
        <option value="drone">🛩 БПЛА (180 км/ч)</option>
        <option value="jet_drone">🚀 Реакт. БПЛА (450 км/ч)</option>
        <option value="cruise">✈️ Крылатая ракета (850 км/ч)</option>
        <option value="ballistic">💥 Баллист. ракета (9000 км/ч)</option>
    </select>
    <div class="distance-info">
        <p>📏 Расстояние: <span id="distKm">0</span> км</p>
        <p>⏱ Время подлёта:</p>
        <div id="timeResult" class="time-result">—</div>
    </div>
    <small>★ Два клика → точки A и B</small>
</div>

<div id="map" style="width:100vw; height:100vh; position:absolute; top:0; left:0; z-index:1;"></div>
<div id="alertsPanel" class="alerts-panel">
    <div class="panel-header"><h3>🚨 Активные тревоги</h3><div><button class="copy-btn" id="copyAlertsBtn">📋 Копировать</button><button class="close-panel" id="closePanelBtn">&times;</button></div></div>
    <div class="panel-content" id="panelContent"><div class="empty-message">Нет активных тревог</div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
    // ---------- КАРТА ----------
    const map = L.map('map', { zoomControl: false }).setView([62,105],3.8);
    const darkTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution:'', subdomains:'abcd', maxZoom:10 });
    const lightTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution:'', subdomains:'abcd' });
    let currentTile = darkTile;
    currentTile.addTo(map);
    function switchTileTheme(isLight) { map.removeLayer(currentTile); currentTile = isLight ? lightTile : darkTile; currentTile.addTo(map); }
    
    // ---------- ДАННЫЕ ----------
    let polygonsLayer = null;
    let labelsLayer = null; // слой для текстовых меток регионов
    let regionStatus = {};
    let lastUpdateTime = null;
    const colors = { clear:"#6c757d", droneDanger:"#ffc107", droneAlert:"#dc3545", rocket:"#8B0000" };
    
    const allRegionNames = [
        "Москва","Московская область","Санкт-Петербург","Ленинградская область",
        "Белгородская область","Брянская область","Владимирская область","Воронежская область",
        "Ивановская область","Калужская область","Костромская область","Курская область",
        "Липецкая область","Нижегородская область","Новгородская область","Орловская область",
        "Пензенская область","Псковская область","Рязанская область","Смоленская область",
        "Тамбовская область","Тверская область","Тульская область","Ярославская область",
        "Краснодарский край","Ставропольский край","Ростовская область","Волгоградская область",
        "Татарстан","Башкортостан","Марий Эл","Чувашская Республика","Республика Мордовия",
        "Удмуртская Республика","Самарская область","Саратовская область","Ульяновская область",
        "Свердловская область","Челябинская область","Курганская область","Оренбургская область",
        "Пермский край","Новосибирская область","Томская область","Кемеровская область",
        "Иркутская область","Красноярский край","Алтайский край","Забайкальский край",
        "Приморский край","Хабаровский край","Амурская область","Сахалинская область",
        "Магаданская область","Камчатский край","Мурманская область","Крым","Дагестан",
        "Республика Карелия","Республика Коми","Республика Саха (Якутия)","ХМАО","ЯНАО","Адыгея"
    ];
    const ignoredRegions = ["Астраханская область","Архангельская область","Омская область"];
    
    const neighbors = {
        "Белгородская область": ["Курская область", "Воронежская область", "Харьковская область"],
        "Курская область": ["Белгородская область", "Орловская область", "Липецкая область", "Воронежская область"],
        "Брянская область": ["Смоленская область", "Калужская область", "Орловская область", "Курская область"],
        "Воронежская область": ["Белгородская область", "Курская область", "Липецкая область", "Тамбовская область", "Волгоградская область", "Ростовская область"],
        "Липецкая область": ["Курская область", "Орловская область", "Тульская область", "Рязанская область", "Тамбовская область", "Воронежская область"],
        "Орловская область": ["Брянская область", "Калужская область", "Тульская область", "Липецкая область", "Курская область"],
        "Ростовская область": ["Воронежская область", "Волгоградская область", "Краснодарский край", "ДНР", "ЛНР"],
        "Волгоградская область": ["Воронежская область", "Ростовская область", "Калмыкия", "Астраханская область"],
        "Краснодарский край": ["Ростовская область", "Крым", "Ставропольский край"],
        "Крым": ["Краснодарский край", "Херсонская область"],
        "Ленинградская область": ["Санкт-Петербург", "Новгородская область", "Псковская область", "Карелия"],
        "Псковская область": ["Ленинградская область", "Новгородская область", "Тверская область", "Смоленская область"],
        "Новгородская область": ["Ленинградская область", "Псковская область", "Тверская область"],
        "Тверская область": ["Новгородская область", "Псковская область", "Смоленская область", "Московская область", "Ярославская область"],
        "Московская область": ["Тверская область", "Смоленская область", "Калужская область", "Тульская область", "Рязанская область", "Владимирская область", "Ярославская область"],
        "Москва": ["Московская область"],
        "Смоленская область": ["Брянская область", "Калужская область", "Тверская область", "Псковская область"],
        "Калужская область": ["Брянская область", "Орловская область", "Тульская область", "Московская область", "Смоленская область"],
        "Тульская область": ["Калужская область", "Орловская область", "Липецкая область", "Рязанская область", "Московская область"],
        "Рязанская область": ["Тульская область", "Липецкая область", "Тамбовская область", "Владимирская область", "Московская область"],
        "Тамбовская область": ["Липецкая область", "Воронежская область", "Саратовская область", "Пензенская область", "Рязанская область"]
    };
    for (let [reg, neigh] of Object.entries(neighbors)) {
        for (let n of neigh) {
            if (!neighbors[n]) neighbors[n] = [];
            if (!neighbors[n].includes(reg)) neighbors[n].push(reg);
        }
    }
    
    const geoNameMapping = {
        "Чувашская Республика":"Чувашская Республика","Республика Татарстан":"Татарстан",
        "Республика Башкортостан":"Башкортостан","Удмуртская Республика":"Удмуртская Республика",
        "Республика Мордовия":"Республика Мордовия","Республика Марий Эл":"Марий Эл",
        "Чеченская Республика":"Чечня","Республика Дагестан":"Дагестан",
        "Республика Адыгея":"Адыгея","Республика Карелия":"Республика Карелия",
        "Республика Коми":"Республика Коми","Ямало-Ненецкий АО":"ЯНАО",
        "Ханты-Мансийский АО":"ХМАО","г. Москва":"Москва","Москва":"Москва",
        "Санкт-Петербург":"Санкт-Петербург","Республика Крым":"Крым"
    };
    function normalizeRegionName(geoName) { return geoNameMapping[geoName] || geoName; }
    
    // Функция для обновления текстовых меток регионов
    function updateRegionLabels() {
        if (labelsLayer) map.removeLayer(labelsLayer);
        if (!polygonsLayer) return;
        labelsLayer = L.layerGroup().addTo(map);
        polygonsLayer.eachLayer(layer => {
            const name = layer.regionName;
            if (!name) return;
            const center = layer.getBounds().getCenter();
            // Создаём красивую метку с фоном
            const label = L.marker(center, {
                icon: L.divIcon({
                    className: 'region-label',
                    html: `<div class="region-label">${name}</div>`,
                    iconSize: null,
                    iconAnchor: [0, 0]
                }),
                interactive: false,
                zIndexOffset: 1000
            });
            labelsLayer.addLayer(label);
        });
    }
    
    // ---------- ПРОГНОЗ ----------
    function getForecastArray() {
        const activeWeight = new Map();
        for (const [region, st] of Object.entries(regionStatus)) {
            if (ignoredRegions.includes(region)) continue;
            let weight = 0;
            if (st.rocket) weight = 3;
            else if (st.droneAlert) weight = 2;
            else if (st.droneDanger) weight = 1;
            if (weight > 0) activeWeight.set(region, weight);
        }
        const forecastMap = new Map();
        for (const [region, weight] of activeWeight.entries()) {
            const neighs = neighbors[region] || [];
            for (const n of neighs) {
                if (activeWeight.has(n)) continue;
                if (ignoredRegions.includes(n)) continue;
                forecastMap.set(n, (forecastMap.get(n) || 0) + weight);
            }
        }
        let arr = Array.from(forecastMap.entries()).map(([region, weight]) => ({ region, weight }));
        arr.sort((a,b) => b.weight - a.weight);
        return arr;
    }
    
    function updateForecast() {
        const arr = getForecastArray();
        const high = [], mid = [], low = [];
        for (let item of arr) {
            if (item.weight >= 4) high.push(item.region);
            else if (item.weight >= 2) mid.push(item.region);
            else low.push(item.region);
        }
        const container = document.getElementById('forecastList');
        if (arr.length === 0) {
            container.innerHTML = '<div class="forecast-empty">📭 Нет прогнозируемых угроз</div>';
            return;
        }
        let html = '';
        if (high.length) html += `<div class="forecast-item forecast-item-high">🔴 Высокий риск (${high.length}): ${high.join(', ')}</div>`;
        if (mid.length) html += `<div class="forecast-item forecast-item-mid">🟡 Средний риск (${mid.length}): ${mid.join(', ')}</div>`;
        if (low.length) html += `<div class="forecast-item forecast-item-low">🟢 Низкий риск (${low.length}): ${low.join(', ')}</div>`;
        container.innerHTML = html;
    }
    
    // ---------- ЭПИЦЕНТР ----------
    function getRegionCenter(regionName) {
        if (!polygonsLayer) return null;
        let center = null;
        polygonsLayer.eachLayer(layer => {
            if (layer.regionName === regionName) center = layer.getBounds().getCenter();
        });
        return center;
    }
    
    function findMostDangerousRegion() {
        let best = null, bestPriority = 0;
        for (const [region, st] of Object.entries(regionStatus)) {
            if (ignoredRegions.includes(region)) continue;
            let priority = 0;
            if (st.rocket) priority = 3;
            else if (st.droneAlert) priority = 2;
            else if (st.droneDanger) priority = 1;
            if (priority > bestPriority) { bestPriority = priority; best = region; }
        }
        return best;
    }
    
    function flyToEpicenter() {
        const reg = findMostDangerousRegion();
        if (!reg) { showToast("Нет активных тревог"); return; }
        const center = getRegionCenter(reg);
        if (center) { map.flyTo(center, 8, { duration: 1.5 }); showToast(`🎯 Эпицентр: ${reg}`); }
        else showToast(`Не найден центр региона ${reg}`);
    }
    
    // ---------- ЗАГРУЗКА ALERTS.JSON ----------
    async function fetchAlerts() {
        try {
            const resp = await fetch("alerts.json?" + Date.now());
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            if (data && data.regions) {
                for (const [region, st] of Object.entries(data.regions)) {
                    if (ignoredRegions.includes(region)) continue;
                    regionStatus[region] = { rocket: !!st.rocket, droneAlert: !!st.droneAlert, droneDanger: !!st.droneDanger };
                }
                for (const region of allRegionNames) {
                    if (!regionStatus[region]) regionStatus[region] = { rocket: false, droneAlert: false, droneDanger: false };
                }
                lastUpdateTime = data.last_updated ? new Date(data.last_updated) : new Date();
                updateMapAndPanel();
                updateLastUpdateInfo();
                updateForecast();
            } else throw new Error("Неверный формат alerts.json");
        } catch (err) { console.error(err); }
    }
    function updateLastUpdateInfo() {
        const el = document.getElementById('lastUpdateInfo');
        el.innerHTML = lastUpdateTime ? `📅 Последнее обновление: ${lastUpdateTime.toLocaleTimeString()}` : `📅 Последнее обновление: --:--`;
    }
    
    // ---------- ОТРИСОВКА КАРТЫ И ПАНЕЛЕЙ ----------
    function getEffectiveStatus(r) { return regionStatus[r] || { rocket:false, droneAlert:false, droneDanger:false }; }
    function getFillColor(eff) {
        if(eff.rocket) return colors.rocket;
        if(eff.droneAlert) return colors.droneAlert;
        if(eff.droneDanger) return colors.droneDanger;
        return colors.clear;
    }
    function getPopupContent(rn, eff) {
        let txt="", col="";
        if(eff.rocket) { txt="🟤 РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!"; col="#ffaaaa"; }
        else if(eff.droneAlert) { txt="🔴 ТРЕВОГА БПЛА! Фиксация / Работа ПВО"; col="#ff8888"; }
        else if(eff.droneDanger) { txt="🟡 Опасность БПЛА в регионе"; col="#ffc107"; }
        else { txt="⚪ Отбой / Спокойно"; col="#adb5bd"; }
        return `<div style="min-width:160px;"><b>${rn}</b><br><span style="color:${col}">${txt}</span></div>`;
    }
    function updateMapAndPanel() {
        if(!polygonsLayer) return;
        polygonsLayer.eachLayer(layer => {
            const norm = normalizeRegionName(layer.regionName);
            const eff = getEffectiveStatus(norm);
            layer.setStyle({ fillColor: getFillColor(eff), fillOpacity: 0.7, color: "#fff", weight: 2.2 });
            layer.getPopup()?.setContent(getPopupContent(norm, eff));
        });
        updateAlertsPanel();
        updateForecast();
        updateRegionLabels(); // обновляем текстовые метки регионов
    }
    
    function updateAlertsPanel() {
        const container = document.getElementById('panelContent');
        const active = [];
        for (const [region, st] of Object.entries(regionStatus)) {
            if(ignoredRegions.includes(region)) continue;
            if(st.rocket) active.push({ name: region, type:'rocket', label:'🟤 Ракетная опасность', priority:1 });
            else if(st.droneAlert) active.push({ name: region, type:'droneAlert', label:'🔴 Тревога БПЛА (ПВО)', priority:2 });
            else if(st.droneDanger) active.push({ name: region, type:'droneDanger', label:'🟡 Опасность БПЛА', priority:3 });
        }
        if(active.length===0) { container.innerHTML = '<div class="empty-message">✨ Нет активных тревог</div>'; return; }
        active.sort((a,b)=>a.priority-b.priority);
        container.innerHTML = active.map(r => `<div class="alert-region-item ${r.type}" data-region="${r.name}"><div class="region-name">${r.name}</div><div class="alert-type ${r.type}">${r.label}</div></div>`).join('');
        
        document.querySelectorAll('.alert-region-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const regionName = el.getAttribute('data-region');
                const center = getRegionCenter(regionName);
                if (center) {
                    map.flyTo(center, 7, { duration: 1.2 });
                    showToast(`📍 Перелёт к ${regionName}`);
                } else {
                    showToast(`Не найден центр региона ${regionName}`);
                }
            });
        });
    }
    
    // ---------- КОПИРОВАНИЕ ----------
    function getCurrentDateTimeString() {
        const now = new Date();
        return `${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getFullYear()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    }
    async function copyAlertsList() {
        const rocket=[], droneAlert=[], droneDanger=[];
        for(const [r,st] of Object.entries(regionStatus)) {
            if(ignoredRegions.includes(r)) continue;
            if(st.rocket) rocket.push(r);
            else if(st.droneAlert) droneAlert.push(r);
            else if(st.droneDanger) droneDanger.push(r);
        }
        const total = rocket.length+droneAlert.length+droneDanger.length;
        if(total===0) { showToast("Нет активных тревог"); return; }
        let text = `📅 Активные тревоги на ${getCurrentDateTimeString()}\n\n`;
        if(rocket.length) text += `🟤 Ракетная опасность (${rocket.length}): ${rocket.join(', ')}\n\n`;
        if(droneAlert.length) text += `🔴 Тревога БПЛА (${droneAlert.length}): ${droneAlert.join(', ')}\n\n`;
        if(droneDanger.length) text += `🟡 Опасность БПЛА (${droneDanger.length}): ${droneDanger.join(', ')}\n`;
        try { await navigator.clipboard.writeText(text); showToast(`📋 Скопировано ${total} тревог (группировано)`); }
        catch { const ta = document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast(`📋 Скопировано ${total} тревог (группировано)`); }
    }
    function showToast(msg) {
        const old = document.querySelector('.copy-toast');
        if(old) old.remove();
        const t = document.createElement('div'); t.className='copy-toast'; t.textContent=msg;
        document.body.appendChild(t); setTimeout(()=>t.remove(),2000);
    }
    
    // ---------- ЛИНЕЙКА ----------
    let rulerModeActive = false;
    let points = [], lineLayer=null, markersLayer=null;
    const speeds = { drone:180, jet_drone:450, cruise:850, ballistic:9000 };
    function calculateTime(d,s) {
        if(d<=0) return "0 мин";
        const mins = (d/s)*60;
        if(mins<1) return "< 1 мин";
        if(mins>=60) return `${Math.floor(mins/60)} ч ${Math.floor(mins%60)} мин`;
        return `${Math.floor(mins)} мин`;
    }
    function updateRulerDisplay() {
        if(points.length<2) { document.getElementById('distKm').innerText='0'; document.getElementById('timeResult').innerHTML='—'; return; }
        const dist = points[0].getLatLng().distanceTo(points[1].getLatLng())/1000;
        document.getElementById('distKm').innerText=dist.toFixed(1);
        const threat = document.getElementById('threatType').value;
        document.getElementById('timeResult').innerHTML = calculateTime(dist, speeds[threat]);
    }
    function updateRulerGraphics() {
        if(lineLayer) map.removeLayer(lineLayer);
        if(markersLayer) map.removeLayer(markersLayer);
        if(points.length===0) return;
        markersLayer = L.layerGroup().addTo(map);
        points.forEach(m => markersLayer.addLayer(m));
        if(points.length===2) {
            const latlngs = points.map(p=>p.getLatLng());
            lineLayer = L.polyline(latlngs, { color:'#ffc107', weight:4, dashArray:'8,6' }).addTo(map);
        }
        updateRulerDisplay();
    }
    function addRulerPoint(e) {
        if(!rulerModeActive) return;
        if(points.length>=2) clearRuler();
        const marker = L.marker(e.latlng, { draggable:true, icon: L.divIcon({ className:'ruler-marker', html:`<div style="background:#ffc107; width:12px; height:12px; border-radius:50%; border:2px solid white;"></div>`, iconSize:[12,12] }) });
        marker.on('dragend', updateRulerGraphics);
        points.push(marker);
        updateRulerGraphics();
    }
    function clearRuler() {
        if(lineLayer) map.removeLayer(lineLayer);
        if(markersLayer) map.removeLayer(markersLayer);
        points.forEach(m=>m.remove());
        points=[]; lineLayer=null; markersLayer=null;
        updateRulerDisplay();
    }
    function setRulerMode(active) {
        rulerModeActive = active;
        const btn = document.getElementById('rulerBtn');
        const panel = document.getElementById('rulerPanel');
        if(active) {
            btn.classList.add('active');
            panel.classList.add('show');
            map.getContainer().style.cursor = 'crosshair';
            if(polygonsLayer) polygonsLayer.eachLayer(layer => { if(layer._path) layer._path.classList.add('leaflet-interactive-off'); });
            map.on('click', addRulerPoint);
        } else {
            btn.classList.remove('active');
            panel.classList.remove('show');
            map.getContainer().style.cursor = '';
            if(polygonsLayer) polygonsLayer.eachLayer(layer => { if(layer._path) layer._path.classList.remove('leaflet-interactive-off'); });
            map.off('click', addRulerPoint);
            clearRuler();
        }
    }
    
    // ---------- ГРАНИЦЫ ----------
    function loadPolygons() {
        const url = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
        const fallback = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
        fetch(url).then(r=>r.ok?r.json():Promise.reject()).then(data=>applyPolygons(data))
            .catch(()=>fetch(fallback).then(r=>r.json()).then(data=>applyPolygons(data)).catch(e=>console.warn("Границы не загружены",e)));
    }
    function applyPolygons(geoData) {
        if(polygonsLayer) map.removeLayer(polygonsLayer);
        polygonsLayer = L.geoJSON(geoData, {
            style: (feature) => {
                let name = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                const norm = normalizeRegionName(name);
                const eff = getEffectiveStatus(norm);
                return { color: "#fff", weight: 2.2, fillColor: getFillColor(eff), fillOpacity: 0.7 };
            },
            onEachFeature: (f, layer) => {
                let name = f.properties?.name || f.properties?.NAME || f.properties?.admin_name || "";
                if(name) {
                    const norm = normalizeRegionName(name);
                    layer.regionName = norm;
                    layer.bindPopup(getPopupContent(norm, getEffectiveStatus(norm)), { className:'custom-popup' });
                }
            }
        }).addTo(map);
        try { map.fitBounds(polygonsLayer.getBounds()); } catch(e) { map.setView([62,105],3.8); }
        updateMapAndPanel();
    }
    
    // ---------- НАСТРОЙКИ ----------
    let isLightTheme = false;
    let rulerEnabled = true;
    let forecastEnabled = true;
    let forecastPanelVisible = false;
    let epicenterEnabled = true;
    
    function applySettings() {
        if(isLightTheme) { document.body.classList.add('light-theme'); switchTileTheme(true); }
        else { document.body.classList.remove('light-theme'); switchTileTheme(false); }
        
        const toolbar = document.getElementById('toolbar');
        const rulerPanel = document.getElementById('rulerPanel');
        if(rulerEnabled) {
            toolbar.style.display = 'flex';
            if(!rulerModeActive) rulerPanel.classList.remove('show');
        } else {
            toolbar.style.display = 'none';
            rulerPanel.classList.remove('show');
            if(rulerModeActive) setRulerMode(false);
        }
        
        const forecastToggleBtn = document.getElementById('forecastToggleBtn');
        if(forecastEnabled) forecastToggleBtn.style.display = 'flex';
        else { forecastToggleBtn.style.display = 'none'; document.getElementById('forecastPanel').style.display = 'none'; forecastPanelVisible = false; }
        if(forecastEnabled && forecastPanelVisible) document.getElementById('forecastPanel').style.display = 'flex';
        else document.getElementById('forecastPanel').style.display = 'none';
        
        let epicenterBtn = document.getElementById('epicenterBtn');
        if(epicenterEnabled && !epicenterBtn) {
            const tb = document.getElementById('toolbar');
            const newBtn = document.createElement('button');
            newBtn.id = 'epicenterBtn';
            newBtn.className = 'tool-btn';
            newBtn.innerHTML = '🎯 Эпицентр';
            newBtn.addEventListener('click', flyToEpicenter);
            tb.insertBefore(newBtn, document.getElementById('clearRulerBtn'));
        } else if(!epicenterEnabled && epicenterBtn) {
            epicenterBtn.remove();
        }
    }
    
    function toggleForecastPanel() { if(forecastEnabled) { forecastPanelVisible = !forecastPanelVisible; document.getElementById('forecastPanel').style.display = forecastPanelVisible ? 'flex' : 'none'; } }
    
    function setDeviceType(device) {
        document.body.classList.remove('device-phone', 'device-tablet', 'device-computer');
        if(device === 'phone') document.body.classList.add('device-phone');
        else if(device === 'tablet') document.body.classList.add('device-tablet');
        else document.body.classList.add('device-computer');
        localStorage.setItem('userDevice', device);
        map.invalidateSize();
    }
    
    function showSettingsModal() {
        const modal = document.createElement('div');
        modal.className = 'settings-modal';
        modal.innerHTML = `
            <div class="settings-modal-content">
                <h3>⚙️ Настройки</h3>
                <div class="setting-item"><label>📏 Линейка</label><input type="checkbox" id="settingRuler" ${rulerEnabled ? 'checked' : ''}></div>
                <div class="setting-item"><label>🔮 Прогноз угроз</label><input type="checkbox" id="settingForecast" ${forecastEnabled ? 'checked' : ''}></div>
                <div class="setting-item"><label>🎯 Эпицентр</label><input type="checkbox" id="settingEpicenter" ${epicenterEnabled ? 'checked' : ''}></div>
                <div class="setting-item"><label>🌙 Тёмная тема</label><input type="checkbox" id="settingTheme" ${isLightTheme ? '' : 'checked'}></div>
                <div class="device-selector"><p>Размер интерфейса:</p><div class="device-buttons"><button data-device="phone">📱 Телефон</button><button data-device="tablet">📟 Планшет</button><button data-device="computer">💻 Компьютер</button></div></div>
                <button class="close-settings" id="closeSettingsBtn">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
        const chkRuler = modal.querySelector('#settingRuler');
        const chkForecast = modal.querySelector('#settingForecast');
        const chkEpicenter = modal.querySelector('#settingEpicenter');
        const chkTheme = modal.querySelector('#settingTheme');
        const deviceBtns = modal.querySelectorAll('[data-device]');
        const closeBtn = modal.querySelector('#closeSettingsBtn');
        
        chkRuler.addEventListener('change', (e) => { rulerEnabled = e.target.checked; applySettings(); saveSettings(); });
        chkForecast.addEventListener('change', (e) => { forecastEnabled = e.target.checked; if (!forecastEnabled) forecastPanelVisible = false; applySettings(); saveSettings(); });
        chkEpicenter.addEventListener('change', (e) => { epicenterEnabled = e.target.checked; applySettings(); saveSettings(); });
        chkTheme.addEventListener('change', (e) => { isLightTheme = !e.target.checked; applySettings(); saveSettings(); });
        deviceBtns.forEach(btn => { btn.addEventListener('click', () => { setDeviceType(btn.getAttribute('data-device')); modal.remove(); }); });
        closeBtn.addEventListener('click', () => modal.remove());
    }
    
    function saveSettings() {
        localStorage.setItem('rulerEnabled', rulerEnabled);
        localStorage.setItem('forecastEnabled', forecastEnabled);
        localStorage.setItem('epicenterEnabled', epicenterEnabled);
        localStorage.setItem('isLightTheme', isLightTheme);
    }
    
    function loadSettings() {
        const savedRuler = localStorage.getItem('rulerEnabled'); if(savedRuler !== null) rulerEnabled = savedRuler === 'true';
        const savedForecast = localStorage.getItem('forecastEnabled'); if(savedForecast !== null) forecastEnabled = savedForecast === 'true';
        const savedEpicenter = localStorage.getItem('epicenterEnabled'); if(savedEpicenter !== null) epicenterEnabled = savedEpicenter === 'true';
        const savedTheme = localStorage.getItem('isLightTheme'); if(savedTheme !== null) isLightTheme = savedTheme === 'true';
        const savedDevice = localStorage.getItem('userDevice');
        if(savedDevice && ['phone','tablet','computer'].includes(savedDevice)) setDeviceType(savedDevice);
        else { const w = window.innerWidth; if (w < 600) setDeviceType('phone'); else if (w < 900) setDeviceType('tablet'); else setDeviceType('computer'); }
        forecastPanelVisible = false;
        applySettings();
    }
    
    function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').innerHTML = now.toLocaleTimeString('ru', { hour:'2-digit', minute:'2-digit' });
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru', { day:'numeric', month:'long', weekday:'short' });
    }
    updateClock(); setInterval(updateClock, 1000);
    
    loadPolygons();
    setTimeout(() => { fetchAlerts(); setInterval(fetchAlerts, 60000); }, 1000);
    
    // ---------- МОДАЛЬНОЕ ОКНО УСТАНОВКИ ----------
    function showInstallModal() {
        const modal = document.createElement('div');
        modal.className = 'install-modal';
        modal.innerHTML = `
            <div class="install-modal-content">
                <h3>📱 Установить приложение</h3>
                <div class="install-carousel" id="installCarousel">
                    <div class="install-step-card">
                        <div class="install-step-icon">📤</div>
                        <div class="install-step-text">
                            <p><strong>Нажмите кнопку «Поделиться»</strong></p>
                            <p>В Safari внизу экрана нажмите на иконку квадрата со стрелкой</p>
                        </div>
                        <div class="install-step-img">📸 <em>Пример: иконка Share</em></div>
                    </div>
                    <div class="install-step-card">
                        <div class="install-step-icon">🏠</div>
                        <div class="install-step-text">
                            <p><strong>Выберите «На экран “Домой”»</strong></p>
                            <p>Прокрутите меню вниз и нажмите на пункт «На экран “Домой”»</p>
                        </div>
                        <div class="install-step-img">📸 <em>Пример: меню Safari</em></div>
                    </div>
                    <div class="install-step-card">
                        <div class="install-step-icon">✅</div>
                        <div class="install-step-text">
                            <p><strong>Нажмите «Добавить»</strong></p>
                            <p>При необходимости измените название и подтвердите установку</p>
                        </div>
                        <div class="install-step-img">📸 <em>Пример: подтверждение</em></div>
                    </div>
                </div>
                <div class="install-dots" id="installDots"></div>
                <div class="install-note">Иконка приложения появится на рабочем столе. Запускайте карту как обычное приложение!</div>
                <button class="close-install">Понятно, закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const carousel = modal.querySelector('#installCarousel');
        const dotsContainer = modal.querySelector('#installDots');
        const cards = modal.querySelectorAll('.install-step-card');
        const totalSteps = cards.length;
        for (let i = 0; i < totalSteps; i++) {
            const dot = document.createElement('div');
            dot.classList.add('install-dot');
            if (i === 0) dot.classList.add('active');
            dot.addEventListener('click', () => {
                carousel.scrollTo({ left: carousel.clientWidth * i, behavior: 'smooth' });
            });
            dotsContainer.appendChild(dot);
        }
        const dots = modal.querySelectorAll('.install-dot');
        const updateActiveDot = () => {
            const scrollLeft = carousel.scrollLeft;
            const cardWidth = carousel.clientWidth;
            const activeIndex = Math.round(scrollLeft / cardWidth);
            dots.forEach((dot, idx) => {
                if (idx === activeIndex) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        };
        carousel.addEventListener('scroll', updateActiveDot);
        window.addEventListener('resize', updateActiveDot);
        const closeBtn = modal.querySelector('.close-install');
        closeBtn.addEventListener('click', () => modal.remove());
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
        setTimeout(updateActiveDot, 100);
    }
    
    document.getElementById('settingsGear').addEventListener('click', () => showSettingsModal());
    document.getElementById('rulerBtn').addEventListener('click', () => setRulerMode(!rulerModeActive));
    document.getElementById('clearRulerBtn').addEventListener('click', clearRuler);
    document.getElementById('threatType').addEventListener('change', updateRulerDisplay);
    document.getElementById('installBtn').addEventListener('click', showInstallModal);
    document.getElementById('forecastToggleBtn').addEventListener('click', toggleForecastPanel);
    document.getElementById('epicenterBtn').addEventListener('click', flyToEpicenter);
    
    const panel = document.getElementById('alertsPanel');
    const openBtn = document.getElementById('openPanelBtn');
    const closeBtn = document.getElementById('closePanelBtn');
    const copyBtn = document.getElementById('copyAlertsBtn');
    openBtn.addEventListener('click', (e) => { e.stopPropagation(); panel.classList.add('open'); updateAlertsPanel(); });
    closeBtn.addEventListener('click', () => panel.classList.remove('open'));
    copyBtn.addEventListener('click', copyAlertsList);
    document.addEventListener('click', (e) => { if(panel.classList.contains('open') && !panel.contains(e.target) && e.target !== openBtn) panel.classList.remove('open'); });
    window.addEventListener('resize', () => map.invalidateSize());
    loadSettings();
})();
</script>
</body>
</html>
