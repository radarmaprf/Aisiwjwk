<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Air Alert Map — Тревоги РФ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            overflow: hidden;
            transition: background 0.3s ease, color 0.2s ease;
        }
        /* ========== СВЕТЛАЯ ТЕМА ========== */
        body.light-theme { background: #eef2f5; }
        body.light-theme .clock,
        body.light-theme .legend,
        body.light-theme .update-info,
        body.light-theme .ruler-panel,
        body.light-theme .alerts-panel,
        body.light-theme .toolbar,
        body.light-theme .settings-modal {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-color: rgba(0, 0, 0, 0.2);
            color: #1a1e2c;
        }
        body.light-theme .time-main { background: linear-gradient(135deg, #333, #666); -webkit-background-clip: text; background-clip: text; color: transparent; }
        body.light-theme .tool-btn { background: rgba(0, 0, 0, 0.1); color: #111; }
        body.light-theme .alert-region-item { background: rgba(0, 0, 0, 0.05); }
        body.light-theme .region-name { color: #111; }
        body.light-theme .legend { color: #1a1e2c; }
        /* ========== ОБЩИЕ СТИЛИ ========== */
        .clock {
            position: fixed;
            top: 20px;
            right: 80px;
            z-index: 2000;
            background: rgba(10,14,26,0.85);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 8px 18px;
            color: #e8eef2;
            font-family: monospace;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .time-main {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1;
            background: linear-gradient(135deg, #fff, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .date { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; text-transform: uppercase; }

        .settings-gear {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            background: rgba(10,14,26,0.85);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.6rem;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s;
            color: #ffd966;
        }
        .settings-gear:hover { background: #28a745; transform: rotate(30deg); color: white; }

        .legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 2000;
            background: rgba(10,14,26,0.85);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 10px 16px;
            color: #e8eef2;
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 24px; height: 16px; border-radius: 4px; }

        .update-info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 6px 16px;
            color: #ccc;
            font-size: 0.75rem;
            font-family: monospace;
            text-align: center;
            pointer-events: none;
        }

        .alert-list-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2000;
            background: rgba(220,53,69,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 40px;
            padding: 8px 18px;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .alert-list-btn:hover { background: #b02a37; transform: scale(1.02); }

        .toolbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .tool-btn {
            background: rgba(30,35,50,0.9);
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tool-btn.active { background: #28a745; box-shadow: 0 0 8px #28a745; }
        .tool-btn:hover { background: #28a745; transform: scale(1.02); }
        .tool-btn.danger { background: #dc3545; }
        .tool-btn.danger:hover { background: #b02a37; }

        .ruler-panel {
            position: fixed;
            top: 80px;
            left: 20px;
            z-index: 2100;
            background: rgba(10,14,26,0.95);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 12px 18px;
            width: 260px;
            border: 1px solid rgba(255,255,255,0.2);
            display: none;
            flex-direction: column;
            gap: 10px;
            font-family: monospace;
        }
        .ruler-panel.show { display: flex; }
        .ruler-panel h4 { margin: 0 0 5px 0; color: #ffc107; font-size: 1rem; }
        .threat-select {
            background: #1a1f2e;
            color: white;
            border: 1px solid #555;
            padding: 6px;
            border-radius: 8px;
            font-size: 0.8rem;
        }
        .distance-info { background: #00000055; padding: 8px; border-radius: 8px; margin-top: 5px; }
        .distance-info p { margin: 4px 0; font-size: 0.75rem; }
        .time-result { font-size: 1.1rem; font-weight: bold; color: #ffc107; text-align: center; }

        .alerts-panel {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100%;
            background: rgba(10,14,26,0.95);
            backdrop-filter: blur(12px);
            z-index: 3000;
            transition: left 0.3s ease;
            border-right: 1px solid rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            font-family: monospace;
            box-shadow: 2px 0 20px rgba(0,0,0,0.5);
        }
        .alerts-panel.open { left: 0; }
        .panel-header {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
        }
        .panel-header h3 { color: #ffc107; font-size: 1.2rem; margin: 0; }
        .panel-actions { display: flex; gap: 12px; }
        .copy-btn { background: rgba(255,255,255,0.15); border: none; color: white; font-size: 1.1rem; cursor: pointer; padding: 4px 10px; border-radius: 20px; transition: 0.2s; font-family: monospace; }
        .copy-btn:hover { background: #28a745; }
        .close-panel { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; line-height: 1; }
        .close-panel:hover { color: #ff6b6b; }
        .panel-content { flex: 1; overflow-y: auto; padding: 12px 8px; }
        .alert-region-item { background: rgba(30,35,50,0.7); margin-bottom: 10px; padding: 12px; border-radius: 12px; border-left: 4px solid; }
        .alert-region-item.rocket { border-left-color: #8B0000; }
        .alert-region-item.droneAlert { border-left-color: #dc3545; }
        .alert-region-item.droneDanger { border-left-color: #ffc107; }
        .region-name { font-weight: bold; font-size: 1rem; margin-bottom: 5px; color: #fff; }
        .alert-type { font-size: 0.8rem; display: inline-block; padding: 2px 8px; border-radius: 20px; }
        .alert-type.rocket { background: #8B000030; color: #ffaaaa; border: 1px solid #8B0000; }
        .alert-type.droneAlert { background: #dc354520; color: #ff8888; border: 1px solid #dc3545; }
        .alert-type.droneDanger { background: #ffc10720; color: #ffc107; border: 1px solid #ffc107; }
        .empty-message { color: #aaa; text-align: center; padding: 30px 20px; font-style: italic; }
        .copy-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #28a745; color: white; padding: 6px 16px; border-radius: 30px; font-size: 0.85rem; z-index: 4000; font-family: monospace; animation: fadeOut 2s forwards; pointer-events: none; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .custom-popup .leaflet-popup-content-wrapper { background: #1a1f2e; color: #e8eef2; border-radius: 12px; border-left: 4px solid; }
        .leaflet-control-attribution { display: none; }
        .leaflet-interactive-off { pointer-events: none !important; }

        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
        }
        .settings-modal-content {
            background: #1e243b;
            border-radius: 32px;
            padding: 28px 24px;
            width: 300px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 1px solid #ffc10760;
        }
        .settings-modal-content h3 { color: #ffc107; margin-bottom: 20px; font-size: 1.4rem; text-align: center; }
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            color: white;
            font-size: 1rem;
        }
        .setting-item label { cursor: pointer; }
        .setting-item input { width: 20px; height: 20px; cursor: pointer; }
        .device-selector {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .device-selector p { color: #ffc107; margin-bottom: 10px; font-size: 0.9rem; }
        .device-buttons {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        .device-buttons button {
            background: #2a2f44;
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            flex: 1;
            transition: 0.2s;
        }
        .device-buttons button:hover { background: #28a745; }
        .close-settings {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: #dc3545;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        body.device-phone .toolbar { top: 70px; padding: 5px 10px; gap: 6px; }
        body.device-phone .tool-btn { padding: 4px 10px; font-size: 0.7rem; }
        body.device-phone .clock { top: 12px; right: 70px; padding: 4px 12px; }
        body.device-phone .settings-gear { top: 12px; right: 12px; width: 38px; height: 38px; font-size: 1.3rem; }
        body.device-phone .time-main { font-size: 1.2rem; }
        body.device-phone .alerts-panel { width: 85%; left: -85%; }
        body.device-phone .ruler-panel { width: 220px; top: 110px; left: 10px; }
        body.device-phone .legend { bottom: 10px; left: 10px; padding: 6px 10px; font-size: 0.65rem; }
        body.device-phone .update-info { bottom: 10px; right: 10px; padding: 4px 12px; font-size: 0.7rem; }
        body.device-phone .alert-list-btn { top: 10px; left: 10px; padding: 5px 12px; font-size: 0.75rem; }
        body.device-tablet .toolbar { top: 20px; padding: 6px 14px; }
        body.device-tablet .tool-btn { padding: 5px 14px; font-size: 0.8rem; }
        body.device-tablet .ruler-panel { width: 250px; top: 85px; }
    </style>
</head>
<body>
<div class="clock"><div class="time-main" id="liveTime">--:--</div><div class="date" id="liveDate">--</div></div>
<div class="settings-gear" id="settingsGear">⚙️</div>
<button class="alert-list-btn" id="openPanelBtn">⚠️ Список тревог</button>

<div class="toolbar" id="toolbar" style="display: none;">
    <button id="rulerBtn" class="tool-btn">📏 Линейка</button>
    <button id="clearRulerBtn" class="tool-btn danger">🗑 Сброс</button>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>🔴 Тревога БПЛА (фиксация/ПВО)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #8B0000;"></div> <span>🟤 Ракетная опасность</span></div>
</div>

<div class="update-info" id="lastUpdateInfo">📅 Последнее обновление: --:--</div>

<div id="rulerPanel" class="ruler-panel">
    <h4>📏 Измерение угрозы</h4>
    <select id="threatType" class="threat-select">
        <option value="drone">🛩 Обычный БПЛА (180 км/ч)</option>
        <option value="jet_drone">🚀 Реактивный БПЛА (450 км/ч)</option>
        <option value="cruise">✈️ Крылатая ракета (850 км/ч)</option>
        <option value="ballistic">💥 Баллистическая ракета (9000 км/ч)</option>
    </select>
    <div class="distance-info">
        <p>📏 Расстояние: <span id="distKm">0</span> км</p>
        <p>⏱ Время подлёта:</p>
        <div id="timeResult" class="time-result">—</div>
    </div>
    <small style="font-size:0.65rem; opacity:0.7;">★ Два клика по карте → точки A и B</small>
</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>
<div id="alertsPanel" class="alerts-panel">
    <div class="panel-header">
        <h3>🚨 Регионы с тревогами</h3>
        <div class="panel-actions"><button class="copy-btn" id="copyAlertsBtn">📋 Копировать</button><button class="close-panel" id="closePanelBtn">&times;</button></div>
    </div>
    <div class="panel-content" id="panelContent"><div class="empty-message">Нет активных тревог</div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
    // ---------- 1. КАРТА ----------
    const map = L.map('map', { zoomControl: false }).setView([62, 105], 3.8);
    const darkTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '', subdomains: 'abcd', maxZoom: 10, minZoom: 2
    });
    const lightTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '', subdomains: 'abcd', maxZoom: 10, minZoom: 2
    });
    let currentTile = darkTile;
    currentTile.addTo(map);
    function switchTileTheme(isLight) { map.removeLayer(currentTile); currentTile = isLight ? lightTile : darkTile; currentTile.addTo(map); }

    // ---------- 2. ГЛОБАЛЬНЫЕ ДАННЫЕ ----------
    let polygonsLayer = null;
    let regionStatus = {};
    let lastUpdateTime = null;
    const colors = { clear: "#6c757d", droneDanger: "#ffc107", droneAlert: "#dc3545", rocket: "#8B0000" };
    
    const allRegionNames = [
        "Москва", "Московская область", "Санкт-Петербург", "Ленинградская область",
        "Белгородская область", "Брянская область", "Владимирская область", "Воронежская область",
        "Ивановская область", "Калужская область", "Костромская область", "Курская область",
        "Липецкая область", "Нижегородская область", "Новгородская область", "Орловская область",
        "Пензенская область", "Псковская область", "Рязанская область", "Смоленская область",
        "Тамбовская область", "Тверская область", "Тульская область", "Ярославская область",
        "Краснодарский край", "Ставропольский край", "Ростовская область", "Волгоградская область",
        "Татарстан", "Башкортостан", "Марий Эл", "Чувашская Республика", "Республика Мордовия",
        "Удмуртская Республика", "Самарская область", "Саратовская область", "Ульяновская область",
        "Свердловская область", "Челябинская область", "Курганская область", "Оренбургская область",
        "Пермский край", "Новосибирская область", "Томская область", "Кемеровская область",
        "Иркутская область", "Красноярский край", "Алтайский край", "Забайкальский край",
        "Приморский край", "Хабаровский край", "Амурская область", "Сахалинская область",
        "Магаданская область", "Камчатский край", "Мурманская область", "Крым", "Дагестан",
        "Республика Карелия", "Республика Коми", "Республика Саха (Якутия)", "ХМАО", "ЯНАО", "Адыгея"
    ];
    const ignoredRegions = ["Астраханская область", "Архангельская область", "Омская область"];
    
    const geoNameMapping = {
        "Чувашская Республика": "Чувашская Республика", "Республика Татарстан": "Татарстан",
        "Республика Башкортостан": "Башкортостан", "Удмуртская Республика": "Удмуртская Республика",
        "Республика Мордовия": "Республика Мордовия", "Республика Марий Эл": "Марий Эл",
        "Чеченская Республика": "Чечня", "Республика Дагестан": "Дагестан",
        "Республика Адыгея": "Адыгея", "Республика Карелия": "Республика Карелия",
        "Республика Коми": "Республика Коми", "Ямало-Ненецкий АО": "ЯНАО",
        "Ханты-Мансийский АО": "ХМАО", "г. Москва": "Москва", "Москва": "Москва",
        "Санкт-Петербург": "Санкт-Петербург", "Республика Крым": "Крым"
    };
    function normalizeRegionName(geoName) { return geoNameMapping[geoName] || geoName; }
    
    // ---------- 3. ЗАГРУЗКА alerts.json ----------
    async function fetchAlerts() {
        try {
            const resp = await fetch("alerts.json?" + Date.now());
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            if (data && data.regions) {
                for (const [region, st] of Object.entries(data.regions)) {
                    if (ignoredRegions.includes(region)) continue;
                    regionStatus[region] = { rocket: !!st.rocket, droneAlert: !!st.droneAlert, droneDanger: !!st.droneDanger };
                }
                for (const region of allRegionNames) {
                    if (!regionStatus[region]) regionStatus[region] = { rocket: false, droneAlert: false, droneDanger: false };
                }
                lastUpdateTime = data.last_updated ? new Date(data.last_updated) : new Date();
                updateMapAndPanel();
                updateLastUpdateInfo();
            } else throw new Error("Неверный формат alerts.json");
        } catch (err) {
            console.error(err);
        }
    }
    function updateLastUpdateInfo() {
        const info = document.getElementById('lastUpdateInfo');
        if(lastUpdateTime) info.innerHTML = `📅 Последнее обновление: ${lastUpdateTime.toLocaleTimeString()}`;
        else info.innerHTML = `📅 Последнее обновление: --:--`;
    }
    
    // ---------- 4. ОТРИСОВКА КАРТЫ ----------
    function getEffectiveStatus(region) { return regionStatus[region] || { rocket:false, droneAlert:false, droneDanger:false }; }
    function getFillColor(eff) {
        if(eff.rocket) return colors.rocket;
        if(eff.droneAlert) return colors.droneAlert;
        if(eff.droneDanger) return colors.droneDanger;
        return colors.clear;
    }
    function getPopupContent(regionName, eff) {
        let text="", color="";
        if(eff.rocket) { text="🟤 РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!"; color="#ffaaaa"; }
        else if(eff.droneAlert) { text="🔴 ТРЕВОГА БПЛА! Фиксация / Работа ПВО"; color="#ff8888"; }
        else if(eff.droneDanger) { text="🟡 Опасность БПЛА в регионе"; color="#ffc107"; }
        else { text="⚪ Отбой / Спокойно"; color="#adb5bd"; }
        return `<div style="font-family:'Segoe UI';min-width:160px;"><b>${regionName}</b><br><span style="color:${color}">${text}</span></div>`;
    }
    function updateMapAndPanel() {
        if(!polygonsLayer) return;
        polygonsLayer.eachLayer(layer => {
            const norm = normalizeRegionName(layer.regionName);
            const eff = getEffectiveStatus(norm);
            layer.setStyle({ fillColor: getFillColor(eff), fillOpacity: 0.7, color: "#fff", weight: 2.2 });
            layer.getPopup()?.setContent(getPopupContent(norm, eff));
        });
        updateAlertsPanel();
    }
    function updateAlertsPanel() {
        const panelDiv = document.getElementById('panelContent');
        const active = [];
        for (const [region, st] of Object.entries(regionStatus)) {
            if(ignoredRegions.includes(region)) continue;
            if(st.rocket) active.push({ name: region, type:'rocket', label:'🟤 Ракетная опасность', priority:1 });
            else if(st.droneAlert) active.push({ name: region, type:'droneAlert', label:'🔴 Тревога БПЛА (фиксация/ПВО)', priority:2 });
            else if(st.droneDanger) active.push({ name: region, type:'droneDanger', label:'🟡 Опасность БПЛА', priority:3 });
        }
        if(active.length===0) { panelDiv.innerHTML = '<div class="empty-message">✨ Нет активных тревог</div>'; return; }
        active.sort((a,b)=>a.priority-b.priority);
        panelDiv.innerHTML = active.map(r => `<div class="alert-region-item ${r.type}"><div class="region-name">${r.name}</div><div class="alert-type ${r.type}">${r.label}</div></div>`).join('');
    }
    
    // ---------- 5. КОПИРОВАНИЕ ----------
    function getCurrentDateTimeString() {
        const now = new Date();
        return `${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getFullYear()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    }
    async function copyAlertsList() {
        const active=[];
        for(const [region, st] of Object.entries(regionStatus)) {
            if(ignoredRegions.includes(region)) continue;
            if(st.rocket) active.push({name:region, label:'🟤 Ракетная опасность'});
            else if(st.droneAlert) active.push({name:region, label:'🔴 Тревога БПЛА (фиксация/работа ПВО)'});
            else if(st.droneDanger) active.push({name:region, label:'🟡 Опасность БПЛА'});
        }
        if(active.length===0) { showToast("✨ Нет активных тревог"); return; }
        const text = `📅 Активные тревоги на ${getCurrentDateTimeString()}\n${active.map(a=>`${a.label}: ${a.name}`).join('\n')}`;
        try { await navigator.clipboard.writeText(text); showToast(`📋 Скопировано ${active.length} тревог`); }
        catch { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast(`📋 Скопировано ${active.length} тревог`); }
    }
    function showToast(msg) {
        const old = document.querySelector('.copy-toast');
        if(old) old.remove();
        const t = document.createElement('div'); t.className='copy-toast'; t.textContent=msg;
        document.body.appendChild(t); setTimeout(()=>t.remove(),2000);
    }
    
    // ---------- 6. ЛИНЕЙКА ----------
    let rulerModeActive = false;
    let points = [], lineLayer=null, markersLayer=null;
    const speeds = { drone:180, jet_drone:450, cruise:850, ballistic:9000 };
    function calculateTime(distKm, speed) {
        if(distKm<=0) return "0 мин";
        const mins = (distKm/speed)*60;
        if(mins<1) return "< 1 мин";
        if(mins>=60) return `${Math.floor(mins/60)} ч ${Math.floor(mins%60)} мин`;
        return `${Math.floor(mins)} мин`;
    }
    function updateRulerDisplay() {
        if(points.length<2) { document.getElementById('distKm').innerText='0'; document.getElementById('timeResult').innerHTML='—'; return; }
        const dist = points[0].getLatLng().distanceTo(points[1].getLatLng())/1000;
        document.getElementById('distKm').innerText=dist.toFixed(1);
        const threat = document.getElementById('threatType').value;
        document.getElementById('timeResult').innerHTML = calculateTime(dist, speeds[threat]);
    }
    function updateRulerGraphics() {
        if(lineLayer) map.removeLayer(lineLayer);
        if(markersLayer) map.removeLayer(markersLayer);
        if(points.length===0) return;
        markersLayer = L.layerGroup().addTo(map);
        points.forEach(m => markersLayer.addLayer(m));
        if(points.length===2) {
            const latlngs = points.map(p=>p.getLatLng());
            lineLayer = L.polyline(latlngs, { color:'#ffc107', weight:4, dashArray:'8,6' }).addTo(map);
        }
        updateRulerDisplay();
    }
    function addRulerPoint(e) {
        if(!rulerModeActive) return;
        if(points.length>=2) clearRuler();
        const marker = L.marker(e.latlng, { draggable:true, icon: L.divIcon({ className:'ruler-marker', html:`<div style="background:#ffc107; width:12px; height:12px; border-radius:50%; border:2px solid white;"></div>`, iconSize:[12,12] }) });
        marker.on('dragend', updateRulerGraphics);
        points.push(marker);
        updateRulerGraphics();
    }
    function clearRuler() {
        if(lineLayer) map.removeLayer(lineLayer);
        if(markersLayer) map.removeLayer(markersLayer);
        points.forEach(m=>m.remove());
        points=[]; lineLayer=null; markersLayer=null;
        updateRulerDisplay();
    }
    function setRulerMode(active) {
        rulerModeActive = active;
        const btn = document.getElementById('rulerBtn');
        const panel = document.getElementById('rulerPanel');
        if(active) {
            btn.classList.add('active');
            panel.classList.add('show');
            map.getContainer().style.cursor = 'crosshair';
            if(polygonsLayer) polygonsLayer.eachLayer(layer => { if(layer._path) layer._path.classList.add('leaflet-interactive-off'); });
            map.on('click', addRulerPoint);
        } else {
            btn.classList.remove('active');
            panel.classList.remove('show');
            map.getContainer().style.cursor = '';
            if(polygonsLayer) polygonsLayer.eachLayer(layer => { if(layer._path) layer._path.classList.remove('leaflet-interactive-off'); });
            map.off('click', addRulerPoint);
            clearRuler();
        }
    }
    
    // ---------- 7. ГРАНИЦЫ ----------
    function loadPolygons() {
        const url = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
        const fallback = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
        fetch(url).then(r=>r.ok?r.json():Promise.reject()).then(data=>applyPolygons(data))
            .catch(()=>fetch(fallback).then(r=>r.json()).then(data=>applyPolygons(data)).catch(e=>console.warn("Границы не загружены",e)));
    }
    function applyPolygons(geoData) {
        if(polygonsLayer) map.removeLayer(polygonsLayer);
        polygonsLayer = L.geoJSON(geoData, {
            style: (feature) => {
                let name = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                const norm = normalizeRegionName(name);
                const eff = getEffectiveStatus(norm);
                return { color: "#fff", weight: 2.2, fillColor: getFillColor(eff), fillOpacity: 0.7 };
            },
            onEachFeature: (f, layer) => {
                let name = f.properties?.name || f.properties?.NAME || f.properties?.admin_name || "";
                if(name) {
                    const norm = normalizeRegionName(name);
                    layer.regionName = norm;
                    layer.bindPopup(getPopupContent(norm, getEffectiveStatus(norm)), { className:'custom-popup' });
                }
            }
        }).addTo(map);
        try { map.fitBounds(polygonsLayer.getBounds()); } catch(e) { map.setView([62,105],3.8); }
        updateMapAndPanel();
    }
    
    // ---------- 8. НАСТРОЙКИ И УСТРОЙСТВО ----------
    let isLightTheme = false;
    let rulerEnabled = true;
    let deviceSelectorEnabled = true;
    
    function applySettings() {
        if(isLightTheme) {
            document.body.classList.add('light-theme');
            switchTileTheme(true);
        } else {
            document.body.classList.remove('light-theme');
            switchTileTheme(false);
        }
        const toolbar = document.getElementById('toolbar');
        const rulerPanel = document.getElementById('rulerPanel');
        if(rulerEnabled) {
            toolbar.style.display = 'flex';
            if(!rulerModeActive) rulerPanel.classList.remove('show');
        } else {
            toolbar.style.display = 'none';
            rulerPanel.classList.remove('show');
            if(rulerModeActive) setRulerMode(false);
        }
        let deviceBtn = document.getElementById('deviceSwitchBtn');
        if(deviceSelectorEnabled) {
            if(!deviceBtn) {
                const tb = document.getElementById('toolbar');
                const newBtn = document.createElement('button');
                newBtn.id = 'deviceSwitchBtn';
                newBtn.className = 'tool-btn';
                newBtn.innerHTML = '📱 Устройство';
                newBtn.addEventListener('click', () => showSettingsModal());
                tb.appendChild(newBtn);
            }
        } else {
            if(deviceBtn) deviceBtn.remove();
        }
    }
    
    function setDeviceType(device) {
        document.body.classList.remove('device-phone', 'device-tablet', 'device-computer');
        if(device === 'phone') document.body.classList.add('device-phone');
        else if(device === 'tablet') document.body.classList.add('device-tablet');
        else document.body.classList.add('device-computer');
        localStorage.setItem('userDevice', device);
    }
    
    function showSettingsModal() {
        const modal = document.createElement('div');
        modal.className = 'settings-modal';
        modal.innerHTML = `
            <div class="settings-modal-content">
                <h3>⚙️ Настройки</h3>
                <div class="setting-item">
                    <label>📏 Линейка</label>
                    <input type="checkbox" id="settingRuler" ${rulerEnabled ? 'checked' : ''}>
                </div>
                <div class="setting-item">
                    <label>🌙 Тёмная тема</label>
                    <input type="checkbox" id="settingTheme" ${isLightTheme ? '' : 'checked'}>
                </div>
                <div class="setting-item">
                    <label>📱 Кнопка смены устройства</label>
                    <input type="checkbox" id="settingDeviceBtn" ${deviceSelectorEnabled ? 'checked' : ''}>
                </div>
                <div class="device-selector">
                    <p>Размер интерфейса:</p>
                    <div class="device-buttons">
                        <button data-device="phone">📱 Телефон</button>
                        <button data-device="tablet">📟 Планшет</button>
                        <button data-device="computer">💻 Компьютер</button>
                    </div>
                </div>
                <button class="close-settings" id="closeSettingsBtn">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const chkRuler = modal.querySelector('#settingRuler');
        const chkTheme = modal.querySelector('#settingTheme');
        const chkDeviceBtn = modal.querySelector('#settingDeviceBtn');
        const deviceBtns = modal.querySelectorAll('[data-device]');
        const closeBtn = modal.querySelector('#closeSettingsBtn');
        
        chkRuler.addEventListener('change', (e) => { rulerEnabled = e.target.checked; applySettings(); saveSettings(); });
        chkTheme.addEventListener('change', (e) => { isLightTheme = !e.target.checked; applySettings(); saveSettings(); });
        chkDeviceBtn.addEventListener('change', (e) => { deviceSelectorEnabled = e.target.checked; applySettings(); saveSettings(); });
        deviceBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const dev = btn.getAttribute('data-device');
                setDeviceType(dev);
                modal.remove();
            });
        });
        closeBtn.addEventListener('click', () => modal.remove());
    }
    
    function saveSettings() {
        localStorage.setItem('rulerEnabled', rulerEnabled);
        localStorage.setItem('isLightTheme', isLightTheme);
        localStorage.setItem('deviceSelectorEnabled', deviceSelectorEnabled);
    }
    
    function loadSettings() {
        const savedRuler = localStorage.getItem('rulerEnabled');
        if(savedRuler !== null) rulerEnabled = savedRuler === 'true';
        const savedTheme = localStorage.getItem('isLightTheme');
        if(savedTheme !== null) isLightTheme = savedTheme === 'true';
        const savedDeviceBtn = localStorage.getItem('deviceSelectorEnabled');
        if(savedDeviceBtn !== null) deviceSelectorEnabled = savedDeviceBtn === 'true';
        const savedDevice = localStorage.getItem('userDevice');
        if(savedDevice && ['phone','tablet','computer'].includes(savedDevice)) setDeviceType(savedDevice);
        else {
            // При первом заходе (нет сохранённого устройства) показываем модальное окно выбора
            showFirstDeviceModal();
        }
        applySettings();
    }
    
    function showFirstDeviceModal() {
        const modal = document.createElement('div');
        modal.className = 'settings-modal';
        modal.innerHTML = `
            <div class="settings-modal-content">
                <h3>📱 Выберите устройство</h3>
                <div class="device-buttons" style="flex-direction: column; gap: 12px;">
                    <button data-device="phone" style="padding: 12px;">📱 Телефон</button>
                    <button data-device="tablet" style="padding: 12px;">📟 Планшет</button>
                    <button data-device="computer" style="padding: 12px;">💻 Компьютер</button>
                </div>
                <div class="device-note" style="margin-top: 16px; font-size: 0.7rem; opacity: 0.7; text-align: center;">Это можно изменить позже в настройках (⚙️)</div>
            </div>
        `;
        document.body.appendChild(modal);
        const btns = modal.querySelectorAll('[data-device]');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const dev = btn.getAttribute('data-device');
                setDeviceType(dev);
                modal.remove();
                // После выбора устройства применяем остальные настройки (тему и т.д.)
                applySettings();
            });
        });
    }
    
    // ---------- 9. ЧАСЫ И АВТООБНОВЛЕНИЕ ----------
    function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').innerHTML = now.toLocaleTimeString('ru', { hour:'2-digit', minute:'2-digit' });
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru', { day:'numeric', month:'long', weekday:'long' });
    }
    updateClock(); setInterval(updateClock, 60000);
    
    loadPolygons();
    setTimeout(() => { fetchAlerts(); setInterval(fetchAlerts, 60000); }, 1000);
    
    // ---------- 10. ОБРАБОТЧИКИ ----------
    document.getElementById('settingsGear').addEventListener('click', () => showSettingsModal());
    document.getElementById('rulerBtn').addEventListener('click', () => setRulerMode(!rulerModeActive));
    document.getElementById('clearRulerBtn').addEventListener('click', clearRuler);
    document.getElementById('threatType').addEventListener('change', updateRulerDisplay);
    const panel = document.getElementById('alertsPanel');
    document.getElementById('openPanelBtn').addEventListener('click', () => { panel.classList.add('open'); updateAlertsPanel(); });
    document.getElementById('closePanelBtn').addEventListener('click', () => panel.classList.remove('open'));
    document.getElementById('copyAlertsBtn').addEventListener('click', copyAlertsList);
    document.addEventListener('click', (e) => {
        if(panel.classList.contains('open') && !panel.contains(e.target) && e.target !== document.getElementById('openPanelBtn'))
            panel.classList.remove('open');
    });
    window.addEventListener('resize', () => map.invalidateSize());
    
    loadSettings(); // загружаем настройки и при необходимости показываем выбор устройства
})();
</script>
</body>
</html>
